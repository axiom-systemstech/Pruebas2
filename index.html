<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CUBATA CONTROLLER 🥃</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0a0a;
            --card: #1a1a1a;
            --text: #ffffff;
            --border: #2a2a2a;
            --primary: #ff3366;
            --secondary: #ff6b35;
            --glow: rgba(255, 51, 102, 0.3);
            --radius: 16px;
            --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 1rem;
            background-image: 
                radial-gradient(ellipse at 20% 50%, rgba(255, 51, 102, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(255, 107, 53, 0.05) 0%, transparent 50%);
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        /* ===== HEADER ===== */
        .header {
            text-align: center;
            padding: 1.5rem 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 1.5rem;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .header p {
            font-size: 0.8rem;
            opacity: 0.5;
            margin-top: 0.2rem;
            letter-spacing: 2px;
        }

        /* ===== CONTADOR ===== */
        .counter {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 0.5rem;
            background: var(--card);
            border-radius: var(--radius);
            padding: 1rem;
            border: 1px solid var(--border);
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .counter-item .number {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .counter-item .label {
            font-size: 0.6rem;
            text-transform: uppercase;
            opacity: 0.5;
            letter-spacing: 1px;
        }

        .counter-item .number.danger {
            background: linear-gradient(135deg, #ff0044, #ff3366);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulse-danger 1s ease-in-out infinite;
        }

        @keyframes pulse-danger {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* ===== BEBIDAS ===== */
        .bebidas-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
            margin-bottom: 1.5rem;
        }

        .bebida-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 0.8rem;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            position: relative;
        }

        .bebida-card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 4px 20px var(--glow);
        }

        .bebida-card.active {
            border-color: var(--primary);
            box-shadow: 0 0 30px var(--glow);
        }

        .bebida-card .emoji {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 0.3rem;
        }

        .bebida-card .nombre {
            font-size: 0.75rem;
            font-weight: 600;
        }

        .bebida-card .marca {
            font-size: 0.6rem;
            opacity: 0.5;
            display: block;
        }

        .bebida-card .botella {
            font-size: 2rem;
            display: block;
            margin: 0.2rem 0;
        }

        .bebida-card .volumen {
            font-size: 0.55rem;
            opacity: 0.4;
        }

        /* ===== COMBINADOS ===== */
        .combinados {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            justify-content: center;
        }

        .combinado-btn {
            padding: 0.4rem 0.8rem;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: transparent;
            color: var(--text);
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .combinado-btn:hover {
            border-color: var(--primary);
        }

        .combinado-btn.active {
            border-color: var(--primary);
            background: var(--primary);
            color: #fff;
        }

        /* ===== CALCULADORA ===== */
        .calculadora {
            background: var(--card);
            border-radius: var(--radius);
            padding: 1.2rem;
            border: 1px solid var(--border);
            margin-bottom: 1.5rem;
        }

        .calculadora .row {
            display: flex;
            gap: 0.8rem;
            align-items: center;
            margin-bottom: 0.8rem;
            flex-wrap: wrap;
        }

        .calculadora label {
            font-size: 0.7rem;
            opacity: 0.6;
            min-width: 80px;
        }

        .calculadora input,
        .calculadora select {
            flex: 1;
            padding: 0.5rem 0.7rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg);
            color: var(--text);
            font-family: inherit;
            font-size: 0.85rem;
            outline: none;
            min-width: 80px;
        }

        .calculadora input:focus,
        .calculadora select:focus {
            border-color: var(--primary);
        }

        .calculadora .btn-agregar {
            width: 100%;
            padding: 0.8rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 8px;
            color: #fff;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            margin-top: 0.5rem;
        }

        .calculadora .btn-agregar:hover {
            transform: scale(0.98);
            opacity: 0.9;
        }

        /* ===== RESULTADO ===== */
        .resultado {
            background: var(--card);
            border-radius: var(--radius);
            padding: 1.2rem;
            border: 1px solid var(--border);
            margin-bottom: 1.5rem;
            display: none;
        }

        .resultado.visible {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .resultado .info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            margin-bottom: 0.8rem;
        }

        .resultado .info-item {
            text-align: center;
            padding: 0.5rem;
            background: var(--bg);
            border-radius: 8px;
        }

        .resultado .info-item .valor {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary);
        }

        .resultado .info-item .etiqueta {
            font-size: 0.6rem;
            opacity: 0.5;
            text-transform: uppercase;
        }

        .resultado .alerta {
            text-align: center;
            padding: 0.5rem;
            border-radius: 8px;
            font-size: 0.8rem;
            margin-top: 0.5rem;
        }

        .resultado .alerta.verde {
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
        }

        .resultado .alerta.naranja {
            background: rgba(241, 196, 15, 0.2);
            color: #f1c40f;
        }

        .resultado .alerta.rojo {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
            animation: pulse-danger 1s ease-in-out infinite;
        }

        /* ===== HISTORIAL ===== */
        .historial {
            background: var(--card);
            border-radius: var(--radius);
            padding: 1rem;
            border: 1px solid var(--border);
        }

        .historial h3 {
            font-size: 0.8rem;
            opacity: 0.5;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        .historial-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.4rem 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.8rem;
        }

        .historial-item:last-child {
            border-bottom: none;
        }

        .historial-item .hora {
            opacity: 0.4;
            font-size: 0.6rem;
        }

        .historial-item .borrar {
            background: none;
            border: none;
            color: #e74c3c;
            cursor: pointer;
            font-size: 0.8rem;
            opacity: 0.4;
        }

        .historial-item .borrar:hover {
            opacity: 1;
        }

        .historial .vacio {
            text-align: center;
            opacity: 0.3;
            font-size: 0.8rem;
            padding: 0.5rem;
        }

        /* ===== BOTONES EXTRA ===== */
        .acciones {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .acciones .btn {
            flex: 1;
            padding: 0.6rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: transparent;
            color: var(--text);
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            text-align: center;
            min-width: 80px;
        }

        .acciones .btn:hover {
            border-color: var(--primary);
        }

        .acciones .btn.danger:hover {
            border-color: #e74c3c;
            color: #e74c3c;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 500px) {
            .bebidas-grid {
                grid-template-columns: 1fr 1fr;
            }
            .resultado .info {
                grid-template-columns: 1fr 1fr;
            }
            .header h1 {
                font-size: 1.5rem;
            }
            .counter-item .number {
                font-size: 1.4rem;
            }
        }

        /* ===== SCROLL ===== */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 2px;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- HEADER -->
    <div class="header">
        <h1>🥃 CUBATA CONTROLLER</h1>
        <p>CONTROL DE ALCOHOL · FIESTA SEGURA</p>
    </div>

    <!-- CONTADOR -->
    <div class="counter">
        <div class="counter-item">
            <span class="number" id="totalCubatas">0</span>
            <div class="label">Cubatas</div>
        </div>
        <div class="counter-item">
            <span class="number" id="totalAlcohol">0</span>
            <div class="label">g alcohol</div>
        </div>
        <div class="counter-item">
            <span class="number" id="alcoholSangre">0.00</span>
            <div class="label">% sangre</div>
        </div>
    </div>

    <!-- BEBIDAS -->
    <div class="bebidas-grid" id="bebidasGrid"></div>

    <!-- COMBINADOS -->
    <div class="combinados" id="combinadosContainer"></div>

    <!-- CALCULADORA -->
    <div class="calculadora">
        <div class="row">
            <label>🍸 Bebida</label>
            <select id="bebidaSelect"></select>
        </div>
        <div class="row">
            <label>🥤 Combinado</label>
            <select id="combinadoSelect"></select>
        </div>
        <div class="row">
            <label>👤 Peso (kg)</label>
            <input type="number" id="pesoInput" value="70" min="40" max="150">
        </div>
        <div class="row">
            <label>⚧️ Sexo</label>
            <select id="sexoSelect">
                <option value="hombre">Hombre</option>
                <option value="mujer">Mujer</option>
            </select>
        </div>
        <button class="btn-agregar" id="btnAgregar">🍹 ¡Añadir Cubata!</button>
    </div>

    <!-- RESULTADO -->
    <div class="resultado" id="resultado">
        <div class="info">
            <div class="info-item">
                <div class="valor" id="rAlcohol">0 g</div>
                <div class="etiqueta">Alcohol</div>
            </div>
            <div class="info-item">
                <div class="valor" id="rSangre">0.00%</div>
                <div class="etiqueta">En sangre</div>
            </div>
            <div class="info-item">
                <div class="valor" id="rEliminacion">0 h</div>
                <div class="etiqueta">Tiempo eliminar</div>
            </div>
            <div class="info-item">
                <div class="valor" id="rCubata">#0</div>
                <div class="etiqueta">Cubata nº</div>
            </div>
        </div>
        <div class="alerta" id="alertaMensaje"></div>
    </div>

    <!-- HISTORIAL -->
    <div class="historial">
        <h3>📋 Historial de la noche</h3>
        <div id="historialList">
            <div class="vacio">Todavía no has bebido nada</div>
        </div>
        <div class="acciones">
            <button class="btn" id="btnExportar">📤 Exportar</button>
            <button class="btn danger" id="btnLimpiar">🗑️ Limpiar todo</button>
        </div>
    </div>
</div>

<script>
    // ============================================================
    //  CUBATA CONTROLLER · TODAS LAS FUNCIONES
    //  Versión 1.0 · Hecho con ❤️ y 🥃
    // ============================================================

    // ----- DATOS -----
    const BEBIDAS = [
        { id: 'johnnie', nombre: 'Johnnie Walker', tipo: 'whisky', emoji: '🥃', botella: '🔲', alcohol: 40, color: '#ffd700' },
        { id: 'ballantine', nombre: 'Ballantine\'s', tipo: 'whisky', emoji: '🥃', botella: '🟠', alcohol: 40, color: '#ff6b35' },
        { id: 'jack', nombre: 'Jack Daniel\'s', tipo: 'whisky', emoji: '🥃', botella: '⬛', alcohol: 40, color: '#1a1a1a' },
        { id: 'buchanan', nombre: 'Buchanan\'s', tipo: 'whisky', emoji: '🥃', botella: '🔵', alcohol: 40, color: '#2e86de' },
        { id: 'havana', nombre: 'Havana Club', tipo: 'ron', emoji: '🍹', botella: '🟡', alcohol: 40, color: '#f9ca24' },
        { id: 'bacardi', nombre: 'Bacardí', tipo: 'ron', emoji: '🍹', botella: '🦇', alcohol: 40, color: '#e74c3c' },
        { id: 'brugal', nombre: 'Brugal', tipo: 'ron', emoji: '🍹', botella: '🟢', alcohol: 38, color: '#2ecc71' },
        { id: 'diplomatico', nombre: 'Diplomático', tipo: 'ron', emoji: '🍹', botella: '🟤', alcohol: 40, color: '#8b6b4d' },
        { id: 'absolut', nombre: 'Absolut', tipo: 'vodka', emoji: '🍸', botella: '🔵', alcohol: 40, color: '#3498db' },
        { id: 'smirnoff', nombre: 'Smirnoff', tipo: 'vodka', emoji: '🍸', botella: '🔴', alcohol: 40, color: '#e74c3c' },
        { id: 'greygoose', nombre: 'Grey Goose', tipo: 'vodka', emoji: '🍸', botella: '🟡', alcohol: 40, color: '#f1c40f' },
        { id: 'stolichnaya', nombre: 'Stolichnaya', tipo: 'vodka', emoji: '🍸', botella: '🔴🔵', alcohol: 40, color: '#c0392b' },
        { id: 'beefeater', nombre: 'Beefeater', tipo: 'ginebra', emoji: '🍸', botella: '🟢', alcohol: 40, color: '#27ae60' },
        { id: 'tanqueray', nombre: 'Tanqueray', tipo: 'ginebra', emoji: '🍸', botella: '🔵', alcohol: 40, color: '#2980b9' },
        { id: 'gordons', nombre: 'Gordon\'s', tipo: 'ginebra', emoji: '🍸', botella: '🟡', alcohol: 37.5, color: '#f1c40f' },
        { id: 'bombay', nombre: 'Bombay Sapphire', tipo: 'ginebra', emoji: '🍸', botella: '🔷', alcohol: 40, color: '#4a69bd' },
        { id: 'jagermeister', nombre: 'Jägermeister', tipo: 'licor', emoji: '🧃', botella: '🟢', alcohol: 35, color: '#1a5c1a' },
        { id: 'baileys', nombre: 'Baileys', tipo: 'licor', emoji: '🧃', botella: '🟤', alcohol: 17, color: '#8b6b4d' },
        { id: 'kahlua', nombre: 'Kahlua', tipo: 'licor', emoji: '🧃', botella: '🟫', alcohol: 20, color: '#6b4c3b' },
        { id: 'cerveza', nombre: 'Cerveza', tipo: 'cerveza', emoji: '🍺', botella: '🍺', alcohol: 5, color: '#f39c12' }
    ];

    const COMBINADOS = [
        { id: 'coca', nombre: 'Coca-Cola', emoji: '🥤' },
        { id: 'tonica', nombre: 'Tónica', emoji: '💧' },
        { id: 'naranja', nombre: 'Zumo Naranja', emoji: '🍊' },
        { id: 'limon', nombre: 'Zumo Limón', emoji: '🍋' },
        { id: 'redbull', nombre: 'Red Bull', emoji: '⚡' },
        { id: 'solo', nombre: 'Solo (sin combinar)', emoji: '🥃' }
    ];

    // ----- ESTADO -----
    let historial = [];
    let totalCubatas = 0;
    let totalAlcohol = 0;
    let cubataCount = 0;
    let selectedBebida = null;
    let selectedCombinado = null;

    // ----- DOM -----
    const bebidasGrid = document.getElementById('bebidasGrid');
    const combinadosContainer = document.getElementById('combinadosContainer');
    const bebidaSelect = document.getElementById('bebidaSelect');
    const combinadoSelect = document.getElementById('combinadoSelect');
    const pesoInput = document.getElementById('pesoInput');
    const sexoSelect = document.getElementById('sexoSelect');
    const btnAgregar = document.getElementById('btnAgregar');
    const resultado = document.getElementById('resultado');
    const historialList = document.getElementById('historialList');
    const btnLimpiar = document.getElementById('btnLimpiar');
    const btnExportar = document.getElementById('btnExportar');

    // ----- RENDER BEBIDAS -----
    function renderBebidas() {
        bebidasGrid.innerHTML = '';
        BEBIDAS.forEach((b, index) => {
            const div = document.createElement('div');
            div.className = 'bebida-card';
            div.dataset.id = b.id;
            div.innerHTML = `
                <span class="botella">${b.botella}</span>
                <span class="nombre">${b.nombre}</span>
                <span class="marca">${b.tipo} · ${b.alcohol}%</span>
                <span class="volumen">${b.emoji}</span>
            `;
            div.addEventListener('click', () => {
                document.querySelectorAll('.bebida-card').forEach(c => c.classList.remove('active'));
                div.classList.add('active');
                selectedBebida = b;
                actualizarSelects();
            });
            if (index === 0) {
                div.classList.add('active');
                selectedBebida = b;
            }
            bebidasGrid.appendChild(div);
        });
        actualizarSelects();
    }

    // ----- RENDER COMBINADOS -----
    function renderCombinados() {
        combinadosContainer.innerHTML = '';
        COMBINADOS.forEach((c, index) => {
            const btn = document.createElement('button');
            btn.className = 'combinado-btn';
            btn.dataset.id = c.id;
            btn.textContent = `${c.emoji} ${c.nombre}`;
            btn.addEventListener('click', () => {
                document.querySelectorAll('.combinado-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedCombinado = c;
                actualizarSelects();
            });
            if (index === 0) {
                btn.classList.add('active');
                selectedCombinado = c;
            }
            combinadosContainer.appendChild(btn);
        });
        actualizarSelects();
    }

    // ----- ACTUALIZAR SELECTS -----
    function actualizarSelects() {
        // Bebidas
        bebidaSelect.innerHTML = '';
        BEBIDAS.forEach(b => {
            const opt = document.createElement('option');
            opt.value = b.id;
            opt.textContent = `${b.botella} ${b.nombre} (${b.alcohol}%)`;
            if (selectedBebida && selectedBebida.id === b.id) opt.selected = true;
            bebidaSelect.appendChild(opt);
        });

        // Combinados
        combinadoSelect.innerHTML = '';
        COMBINADOS.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c.id;
            opt.textContent = `${c.emoji} ${c.nombre}`;
            if (selectedCombinado && selectedCombinado.id === c.id) opt.selected = true;
            combinadoSelect.appendChild(opt);
        });
    }

    // ----- CALCULAR CUBATA -----
    function calcularCubata() {
        const bebidaId = bebidaSelect.value;
        const combinadoId = combinadoSelect.value;
        const peso = parseFloat(pesoInput.value) || 70;
        const sexo = sexoSelect.value;

        const bebida = BEBIDAS.find(b => b.id === bebidaId);
        const combinado = COMBINADOS.find(c => c.id === combinadoId);

        if (!bebida) return;

        // Cantidad de alcohol en gramos (estimado 50ml de bebida)
        const ml = 50;
        const alcoholGramos = (ml * bebida.alcohol * 0.8) / 100;

        // Factor de distribución (hombre: 0.7, mujer: 0.6)
        const factor = sexo === 'hombre' ? 0.7 : 0.6;
        const alcoholSangre = (alcoholGramos / (peso * factor)) / 10;

        // Tiempo de eliminación (aprox 0.15g/L por hora)
        const tiempoEliminacion = alcoholSangre / 0.15;

        // Actualizar totales
        cubataCount++;
        totalCubatas++;
        totalAlcohol += alcoholGramos;

        // Guardar en historial
        const entry = {
            id: Date.now(),
            hora: new Date().toLocaleTimeString(),
            bebida: bebida.nombre,
            combinado: combinado ? combinado.nombre : 'Solo',
            alcohol: alcoholGramos,
            sangre: alcoholSangre,
            cubata: cubataCount
        };
        historial.push(entry);

        // Mostrar resultado
        mostrarResultado(entry, alcoholSangre, tiempoEliminacion, bebida);
        actualizarContadores();
        renderHistorial();
        guardarDatos();
    }

    // ----- MOSTRAR RESULTADO -----
    function mostrarResultado(entry, sangre, tiempo, bebida) {
        resultado.classList.add('visible');
        document.getElementById('rAlcohol').textContent = `${entry.alcohol.toFixed(1)} g`;
        document.getElementById('rSangre').textContent = `${sangre.toFixed(3)}%`;
        document.getElementById('rEliminacion').textContent = `${Math.ceil(tiempo)} h`;
        document.getElementById('rCubata').textContent = `#${entry.cubata}`;

        const alerta = document.getElementById('alertaMensaje');
        if (sangre < 0.3) {
            alerta.className = 'alerta verde';
            alerta.textContent = '✅ ¡Controlado! Sigues en zona segura.';
        } else if (sangre < 0.5) {
            alerta.className = 'alerta naranja';
            alerta.textContent = '⚠️ Cuidado, estás cerca del límite. ¡Tómate un agua!';
        } else {
            alerta.className = 'alerta rojo';
            alerta.textContent = '🔴 ¡ALERTA! Estás en zona de peligro. ¡Deja de beber!';
        }

        // Efecto de vibración
        if (sangre > 0.5 && navigator.vibrate) {
            navigator.vibrate([200, 100, 200]);
        }
    }

    // ----- ACTUALIZAR CONTADORES -----
    function actualizarContadores() {
        document.getElementById('totalCubatas').textContent = totalCubatas;
        document.getElementById('totalAlcohol').textContent = Math.round(totalAlcohol);
        
        const peso = parseFloat(pesoInput.value) || 70;
        const sexo = sexoSelect.value;
        const factor = sexo === 'hombre' ? 0.7 : 0.6;
        const sangreTotal = (totalAlcohol / (peso * factor)) / 10;
        const sangreElement = document.getElementById('alcoholSangre');
        sangreElement.textContent = sangreTotal.toFixed(3);
        
        if (sangreTotal > 0.5) {
            sangreElement.classList.add('danger');
        } else {
            sangreElement.classList.remove('danger');
        }
    }

    // ----- RENDER HISTORIAL -----
    function renderHistorial() {
        if (historial.length === 0) {
            historialList.innerHTML = '<div class="vacio">Todavía no has bebido nada</div>';
            return;
        }

        historialList.innerHTML = '';
        // Mostrar último primero
        const reversed = [...historial].reverse();
        reversed.forEach(entry => {
            const div = document.createElement('div');
            div.className = 'historial-item';
            div.innerHTML = `
                <span>
                    <strong>#${entry.cubata}</strong> ${entry.bebida} + ${entry.combinado}
                    <span class="hora">${entry.hora}</span>
                </span>
                <span>
                    ${entry.alcohol.toFixed(1)}g
                    <button class="borrar" data-id="${entry.id}">✕</button>
                </span>
            `;
            historialList.appendChild(div);
        });

        // Eventos de borrar
        document.querySelectorAll('.borrar').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(e.target.dataset.id);
                const idx = historial.findIndex(h => h.id === id);
                if (idx !== -1) {
                    const removed = historial[idx];
                    totalCubatas--;
                    totalAlcohol -= removed.alcohol;
                    historial.splice(idx, 1);
                    guardarDatos();
                    actualizarContadores();
                    renderHistorial();
                    if (historial.length === 0) {
                        resultado.classList.remove('visible');
                        document.getElementById('totalCubatas').textContent = '0';
                        document.getElementById('totalAlcohol').textContent = '0';
                        document.getElementById('alcoholSangre').textContent = '0.00';
                    }
                }
            });
        });
    }

    // ----- GUARDAR / CARGAR -----
    function guardarDatos() {
        try {
            localStorage.setItem('cubata_historial', JSON.stringify(historial));
            localStorage.setItem('cubata_total', JSON.stringify({ totalCubatas, totalAlcohol, cubataCount }));
        } catch(e) {}
    }

    function cargarDatos() {
        try {
            const saved = localStorage.getItem('cubata_historial');
            if (saved) {
                historial = JSON.parse(saved);
                const totals = JSON.parse(localStorage.getItem('cubata_total'));
                if (totals) {
                    totalCubatas = totals.totalCubatas || 0;
                    totalAlcohol = totals.totalAlcohol || 0;
                    cubataCount = totals.cubataCount || 0;
                }
                renderHistorial();
                actualizarContadores();
                if (historial.length > 0) {
                    resultado.classList.add('visible');
                    const last = historial[historial.length - 1];
                    const peso = parseFloat(pesoInput.value) || 70;
                    const sexo = sexoSelect.value;
                    const factor = sexo === 'hombre' ? 0.7 : 0.6;
                    const sangre = (totalAlcohol / (peso * factor)) / 10;
                    document.getElementById('rAlcohol').textContent = `${totalAlcohol.toFixed(1)} g`;
                    document.getElementById('rSangre').textContent = `${sangre.toFixed(3)}%`;
                    document.getElementById('rCubata').textContent = `#${cubataCount}`;
                }
            }
        } catch(e) {}
    }

    // ----- EXPORTAR -----
    function exportar() {
        if (historial.length === 0) {
            alert('No hay nada que exportar. ¡Bebe algo primero! 🍻');
            return;
        }

        const texto = `=== CUBATA CONTROLLER ===\n`;
        const fecha = new Date().toLocaleString();
        const total = historial.length;
        const alcoholTotal = historial.reduce((sum, h) => sum + h.alcohol, 0);
        const contenido = historial.map((h, i) => 
            `${i+1}. ${h.hora} - ${h.bebida} + ${h.combinado} (${h.alcohol.toFixed(1)}g alcohol)`
        ).join('\n');

        const mensaje = `${texto}\n📅 ${fecha}\n\nTotal cubatas: ${total}\nTotal alcohol: ${alcoholTotal.toFixed(1)}g\n\n${contenido}`;

        const blob = new Blob([mensaje], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `cubatas_${new Date().toISOString().split('T')[0]}.txt`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    // ----- LIMPIAR TODO -----
    function limpiarTodo() {
        if (!confirm('¿Seguro que quieres limpiar todo el historial?')) return;
        historial = [];
        totalCubatas = 0;
        totalAlcohol = 0;
        cubataCount = 0;
        guardarDatos();
        renderHistorial();
        actualizarContadores();
        resultado.classList.remove('visible');
        document.getElementById('totalCubatas').textContent = '0';
        document.getElementById('totalAlcohol').textContent = '0';
        document.getElementById('alcoholSangre').textContent = '0.00';
        document.getElementById('alcoholSangre').classList.remove('danger');
    }

    // ----- EVENTOS -----
    btnAgregar.addEventListener('click', calcularCubata);
    btnLimpiar.addEventListener('click', limpiarTodo);
    btnExportar.addEventListener('click', exportar);

    // Enter en el peso
    pesoInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') calcularCubata();
    });

    // Cambio en selectores
    bebidaSelect.addEventListener('change', () => {
        const id = bebidaSelect.value;
        const bebida = BEBIDAS.find(b => b.id === id);
        if (bebida) {
            selectedBebida = bebida;
            document.querySelectorAll('.bebida-card').forEach(c => {
                c.classList.toggle('active', c.dataset.id === id);
            });
        }
    });

    combinadoSelect.addEventListener('change', () => {
        const id = combinadoSelect.value;
        const combinado = COMBINADOS.find(c => c.id === id);
        if (combinado) {
            selectedCombinado = combinado;
            document.querySelectorAll('.combinado-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.id === id);
            });
        }
    });

    // ----- INICIALIZAR -----
    renderBebidas();
    renderCombinados();
    cargarDatos();

    console.log('🥃 CUBATA CONTROLLER cargado con éxito');
    console.log(`📋 ${historial.length} cubatas en el historial`);
    console.log('🍻 ¡Bebe con responsabilidad!');
</script>
</body>
