<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AXIOM DIARIO · Diario Definitivo</title>
    <style>
        /* ===== RESET Y ESTILOS BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #f8f5f0;
            --text: #1a1a1a;
            --border: #e0d8d0;
            --card: #ffffff;
            --shadow: rgba(0,0,0,0.05);
            --accent: #2c3e50;
            --radius: 12px;
            --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --transition: 0.3s ease;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 1rem;
            transition: all var(--transition);
        }

        body.dark {
            --bg: #0a0a0a;
            --text: #e8e8e8;
            --border: #2a2a2a;
            --card: #141414;
            --shadow: rgba(0,0,0,0.3);
            --accent: #8a9baa;
        }

        body.sepia {
            --bg: #f4ecd8;
            --text: #2c1810;
            --border: #d4c4a8;
            --card: #faf3e8;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0.5rem;
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            padding: 1.2rem 1.5rem;
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: 0 2px 12px var(--shadow);
            margin-bottom: 1.5rem;
            border: 1px solid var(--border);
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 300;
            letter-spacing: 2px;
            font-family: 'Georgia', serif;
        }

        .header h1 span {
            font-weight: 700;
            color: var(--accent);
        }

        .header-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
        }

        .btn {
            padding: 0.4rem 0.9rem;
            font-size: 0.7rem;
            font-weight: 400;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 6px;
            cursor: pointer;
            transition: all var(--transition);
            font-family: inherit;
            letter-spacing: 0.3px;
        }

        .btn:hover {
            background: var(--text);
            color: var(--bg);
            border-color: var(--text);
        }

        body.dark .btn:hover {
            background: var(--text);
            color: var(--bg);
        }

        .btn-primary {
            background: var(--text);
            color: var(--bg);
            border-color: var(--text);
        }

        .btn-primary:hover {
            opacity: 0.8;
            transform: scale(0.97);
        }

        .btn-sm {
            padding: 0.25rem 0.6rem;
            font-size: 0.65rem;
        }

        /* ===== CALENDARIO Y NAVEGACIÓN ===== */
        .nav-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            align-items: center;
            justify-content: space-between;
            padding: 0.8rem 1.2rem;
            background: var(--card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            margin-bottom: 1.2rem;
        }

        .date-nav {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .date-nav .date-display {
            font-size: 1.1rem;
            font-weight: 500;
            min-width: 140px;
            text-align: center;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            max-width: 350px;
            margin: 0.5rem auto;
        }

        .calendar-grid .day {
            padding: 0.4rem 0.2rem;
            text-align: center;
            font-size: 0.7rem;
            border-radius: 4px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all var(--transition);
        }

        .calendar-grid .day:hover {
            background: var(--border);
        }

        .calendar-grid .day.has-entry {
            border-color: var(--accent);
            font-weight: 600;
        }

        .calendar-grid .day.today {
            background: var(--accent);
            color: var(--bg);
        }

        .calendar-grid .day.empty {
            opacity: 0.2;
            cursor: default;
        }

        /* ===== EDITOR ===== */
        .editor-wrapper {
            background: var(--card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 1.5rem;
            margin-bottom: 1.2rem;
            transition: all var(--transition);
        }

        .editor-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
            padding-bottom: 0.8rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 1rem;
        }

        #entryTitle {
            width: 100%;
            padding: 0.6rem 0.2rem;
            font-size: 1.4rem;
            font-weight: 300;
            border: none;
            border-bottom: 1px solid var(--border);
            background: transparent;
            color: var(--text);
            font-family: 'Georgia', serif;
            outline: none;
            margin-bottom: 0.8rem;
        }

        #entryContent {
            width: 100%;
            min-height: 350px;
            padding: 0.5rem 0.2rem;
            font-size: 1rem;
            line-height: 1.8;
            border: none;
            background: transparent;
            color: var(--text);
            resize: vertical;
            outline: none;
            font-family: var(--font);
        }

        .editor-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            padding-top: 0.8rem;
            border-top: 1px solid var(--border);
            margin-top: 0.8rem;
            font-size: 0.75rem;
            opacity: 0.6;
        }

        .editor-meta select, .editor-meta input {
            background: transparent;
            border: 1px solid var(--border);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            color: var(--text);
            font-family: inherit;
            font-size: 0.7rem;
        }

        /* ===== STATS ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 0.8rem;
            padding: 1rem 1.2rem;
            background: var(--card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            margin-bottom: 1.2rem;
        }

        .stat-item {
            text-align: center;
        }

        .stat-item .number {
            font-size: 1.6rem;
            font-weight: 300;
            display: block;
            font-family: 'Georgia', serif;
        }

        .stat-item .label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.5;
        }

        /* ===== LISTA DE ENTRADAS ===== */
        .entries-list {
            background: var(--card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 1rem;
            max-height: 300px;
            overflow-y: auto;
        }

        .entry-item {
            padding: 0.6rem 0.8rem;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all var(--transition);
        }

        .entry-item:hover {
            background: var(--border);
            border-radius: 4px;
        }

        .entry-item .entry-date {
            font-size: 0.75rem;
            opacity: 0.6;
        }

        .entry-item .entry-preview {
            font-size: 0.85rem;
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .entry-item .entry-tags {
            font-size: 0.6rem;
            opacity: 0.5;
        }

        /* ===== ESTADOS DE ÁNIMO ===== */
        .mood-selector {
            display: flex;
            gap: 0.3rem;
            flex-wrap: wrap;
        }

        .mood-btn {
            padding: 0.2rem 0.6rem;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: transparent;
            color: var(--text);
            cursor: pointer;
            font-size: 0.7rem;
            transition: all var(--transition);
        }

        .mood-btn.active {
            background: var(--accent);
            color: var(--bg);
            border-color: var(--accent);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 700px) {
            .header { flex-direction: column; align-items: stretch; }
            .header h1 { font-size: 1.4rem; }
            .nav-bar { flex-direction: column; }
            .calendar-grid { max-width: 100%; }
            .stats-grid { grid-template-columns: repeat(3, 1fr); }
            .editor-wrapper { padding: 1rem; }
            #entryContent { min-height: 200px; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    </style>
</head>
<body>

<div class="container">
    <!-- HEADER -->
    <header class="header">
        <h1>AXIOM <span>DIARIO</span></h1>
        <div class="header-actions">
            <button class="btn btn-sm" id="themeToggle">Light Mode</button>
            <button class="btn btn-sm" id="themeSepia">Sepia</button>
            <button class="btn btn-sm" id="exportTxt">.txt</button>
            <button class="btn btn-sm" id="exportMd">.md</button>
            <button class="btn btn-sm" id="exportJson">.json</button>
            <button class="btn btn-sm btn-primary" id="importJson">⬆ Import</button>
            <button class="btn btn-sm" id="exportPdf">PDF</button>
            <button class="btn btn-sm" id="printEntry">🖨️ Print</button>
        </div>
    </header>

    <!-- NAV + CALENDAR -->
    <div class="nav-bar">
        <div class="date-nav">
            <button class="btn btn-sm" id="prevDay">◀</button>
            <span class="date-display" id="currentDateDisplay">Hoy</span>
            <button class="btn btn-sm" id="nextDay">▶</button>
            <button class="btn btn-sm" id="todayBtn">Hoy</button>
        </div>
        <div>
            <button class="btn btn-sm" id="showCalendar">📅 Calendario</button>
            <button class="btn btn-sm" id="showEntries">📋 Lista</button>
            <button class="btn btn-sm btn-primary" id="newEntryBtn">+ Nueva</button>
        </div>
    </div>

    <!-- CALENDARIO (oculto) -->
    <div id="calendarContainer" style="display:none; background:var(--card); border-radius:var(--radius); border:1px solid var(--border); padding:1rem; margin-bottom:1rem;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.8rem;">
            <button class="btn btn-sm" id="prevMonth">◀</button>
            <span id="monthYearDisplay" style="font-weight:500;">Enero 2025</span>
            <button class="btn btn-sm" id="nextMonth">▶</button>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <!-- LISTA DE ENTRADAS (oculta) -->
    <div id="entriesContainer" style="display:none; margin-bottom:1rem;">
        <div class="entries-list" id="entriesList"></div>
    </div>

    <!-- EDITOR -->
    <div class="editor-wrapper">
        <div class="editor-toolbar">
            <button class="btn btn-sm" id="boldBtn">B</button>
            <button class="btn btn-sm" id="italicBtn">I</button>
            <button class="btn btn-sm" id="underlineBtn">U</button>
            <button class="btn btn-sm" id="strikeBtn">S</button>
            <button class="btn btn-sm" id="h1Btn">H1</button>
            <button class="btn btn-sm" id="h2Btn">H2</button>
            <button class="btn btn-sm" id="quoteBtn">"</button>
            <button class="btn btn-sm" id="listBtn">•</button>
            <button class="btn btn-sm" id="listNumBtn">1.</button>
            <button class="btn btn-sm" id="alignLeft">←</button>
            <button class="btn btn-sm" id="alignCenter">↔</button>
            <button class="btn btn-sm" id="alignRight">→</button>
            <button class="btn btn-sm" id="fontSmall">A-</button>
            <button class="btn btn-sm" id="fontLarge">A+</button>
            <button class="btn btn-sm" id="focusMode">◎ Focus</button>
        </div>

        <input type="text" id="entryTitle" placeholder="Título de la entrada...">

        <div style="display:flex; gap:0.5rem; flex-wrap:wrap; margin-bottom:0.5rem;">
            <select id="moodSelect" style="padding:0.2rem 0.5rem; border:1px solid var(--border); border-radius:4px; background:transparent; color:var(--text); font-size:0.7rem;">
                <option value="">Estado de ánimo</option>
                <option value="feliz">Feliz</option>
                <option value="triste">Triste</option>
                <option value="enojado">Enojado</option>
                <option value="ansioso">Ansioso</option>
                <option value="relajado">Relajado</option>
                <option value="inspirado">Inspirado</option>
                <option value="cansado">Cansado</option>
                <option value="enamorado">Enamorado</option>
                <option value="confundido">Confundido</option>
                <option value="agradecido">Agradecido</option>
            </select>
            <input type="text" id="tagsInput" placeholder="Tags (separados por ,)" style="flex:1; padding:0.2rem 0.5rem; border:1px solid var(--border); border-radius:4px; background:transparent; color:var(--text); font-size:0.7rem;">
            <input type="text" id="locationInput" placeholder="Ubicación" style="flex:1; padding:0.2rem 0.5rem; border:1px solid var(--border); border-radius:4px; background:transparent; color:var(--text); font-size:0.7rem;">
        </div>

        <textarea id="entryContent" placeholder="Escribe tu entrada aquí..."></textarea>

        <div class="editor-meta">
            <span>Palabras: <strong id="wordCount">0</strong></span>
            <span>Caracteres: <strong id="charCount">0</strong></span>
            <span>⏱️ <span id="readingTime">0</span> min lectura</span>
            <span>Racha: <strong id="streakCount">0</strong> días</span>
            <span>Total: <strong id="totalWords">0</strong> palabras</span>
            <span style="margin-left:auto;">🕒 <span id="lastSaved">Guardado automático</span></span>
        </div>
    </div>

    <!-- STATS -->
    <div class="stats-grid">
        <div class="stat-item"><span class="number" id="totalEntries">0</span><span class="label">Entradas</span></div>
        <div class="stat-item"><span class="number" id="totalWordsStat">0</span><span class="label">Palabras totales</span></div>
        <div class="stat-item"><span class="number" id="avgWords">0</span><span class="label">Promedio/día</span></div>
        <div class="stat-item"><span class="number" id="bestStreak">0</span><span class="label">Mejor racha</span></div>
        <div class="stat-item"><span class="number" id="currentStreak">0</span><span class="label">Racha actual</span></div>
        <div class="stat-item"><span class="number" id="daysSinceStart">0</span><span class="label">Días totales</span></div>
    </div>

    <!-- BOTONES DE ACCIÓN RÁPIDA -->
    <div style="display:flex; flex-wrap:wrap; gap:0.4rem; justify-content:center; margin-top:0.5rem;">
        <button class="btn btn-sm" id="challengeBtn">🎯 Desafío del día</button>
        <button class="btn btn-sm" id="randomEntryBtn">🎲 Entrada aleatoria</button>
        <button class="btn btn-sm" id="gratitudeBtn">🙏 Ejercicio de gratitud</button>
        <button class="btn btn-sm" id="affirmationBtn">✨ Afirmación positiva</button>
        <button class="btn btn-sm" id="exportAllTxt">📚 Exportar todo .txt</button>
    </div>
</div>

<script>
    // ============================================================
    //  AXIOM DIARIO · TODAS LAS 330 FUNCIONES
    //  Versión 1.0 · Todo en un solo archivo
    // ============================================================

    // ----- ESTADO GLOBAL -----
    const state = {
        entries: {},
        currentDate: new Date(),
        selectedDate: new Date(),
        streak: 0,
        bestStreak: 0,
        totalWords: 0,
        totalEntries: 0,
        darkMode: false,
        sepiaMode: false,
        focusMode: false,
        fontSize: 'medium',
        fontFamily: 'Inter',
        mood: '',
        tags: [],
        location: '',
        calendarView: false,
        entriesView: false,
        currentMonth: new Date().getMonth(),
        currentYear: new Date().getFullYear(),
    };

    // ----- DOM ELEMENTOS -----
    const entryTitle = document.getElementById('entryTitle');
    const entryContent = document.getElementById('entryContent');
    const currentDateDisplay = document.getElementById('currentDateDisplay');
    const wordCount = document.getElementById('wordCount');
    const charCount = document.getElementById('charCount');
    const readingTime = document.getElementById('readingTime');
    const streakCount = document.getElementById('streakCount');
    const totalWords = document.getElementById('totalWords');
    const lastSaved = document.getElementById('lastSaved');
    const totalEntries = document.getElementById('totalEntries');
    const totalWordsStat = document.getElementById('totalWordsStat');
    const avgWords = document.getElementById('avgWords');
    const bestStreak = document.getElementById('bestStreak');
    const currentStreak = document.getElementById('currentStreak');
    const daysSinceStart = document.getElementById('daysSinceStart');
    const moodSelect = document.getElementById('moodSelect');
    const tagsInput = document.getElementById('tagsInput');
    const locationInput = document.getElementById('locationInput');

    // ----- FUNCIONES PRINCIPALES -----

    // Formatear fecha
    function formatDate(date) {
        const d = new Date(date);
        return d.toISOString().split('T')[0];
    }

    function formatDateDisplay(date) {
        const d = new Date(date);
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        return d.toLocaleDateString('es-ES', options);
    }

    function getToday() {
        return formatDate(new Date());
    }

    // Cargar datos guardados
    function loadData() {
        try {
            const saved = localStorage.getItem('axiom_diario_entries');
            if (saved) state.entries = JSON.parse(saved);
            
            const prefs = localStorage.getItem('axiom_diario_prefs');
            if (prefs) {
                const p = JSON.parse(prefs);
                state.darkMode = p.darkMode || false;
                state.sepiaMode = p.sepiaMode || false;
                state.fontSize = p.fontSize || 'medium';
                state.fontFamily = p.fontFamily || 'Inter';
                state.currentDate = new Date(p.currentDate || new Date());
                state.selectedDate = new Date(p.selectedDate || new Date());
                state.streak = p.streak || 0;
                state.bestStreak = p.bestStreak || 0;
                state.totalWords = p.totalWords || 0;
                state.totalEntries = p.totalEntries || 0;
            }
        } catch(e) { console.log('Error cargando datos', e); }
        
        updateStats();
        applyTheme();
        renderCalendar();
        loadEntryForDate(state.selectedDate);
        updateUI();
    }

    // Guardar datos
    function saveData() {
        try {
            localStorage.setItem('axiom_diario_entries', JSON.stringify(state.entries));
            localStorage.setItem('axiom_diario_prefs', JSON.stringify({
                darkMode: state.darkMode,
                sepiaMode: state.sepiaMode,
                fontSize: state.fontSize,
                fontFamily: state.fontFamily,
                currentDate: state.currentDate,
                selectedDate: state.selectedDate,
                streak: state.streak,
                bestStreak: state.bestStreak,
                totalWords: state.totalWords,
                totalEntries: state.totalEntries
            }));
            lastSaved.textContent = 'Guardado: ' + new Date().toLocaleTimeString();
        } catch(e) { console.log('Error guardando', e); }
    }

    // Guardar entrada actual
    function saveCurrentEntry() {
        const dateKey = formatDate(state.selectedDate);
        const title = entryTitle.value.trim();
        const content = entryContent.value.trim();
        
        if (!title && !content) {
            // Si está vacío y no hay entrada, eliminar
            if (state.entries[dateKey]) {
                delete state.entries[dateKey];
                updateStats();
                saveData();
                renderCalendar();
                updateUI();
            }
            return;
        }

        const entry = {
            title: title || 'Sin título',
            content: content || '',
            date: dateKey,
            mood: moodSelect.value || '',
            tags: tagsInput.value.split(',').map(t => t.trim()).filter(t => t),
            location: locationInput.value || '',
            words: content.split(/\s+/).filter(w => w).length,
            characters: content.length,
            updated: new Date().toISOString()
        };

        state.entries[dateKey] = entry;
        state.totalEntries = Object.keys(state.entries).length;
        state.totalWords += entry.words;
        
        // Actualizar racha
        updateStreak();
        
        updateStats();
        saveData();
        renderCalendar();
        updateUI();
        updateEntryList();
    }

    // Cargar entrada para una fecha
    function loadEntryForDate(date) {
        const dateKey = formatDate(date);
        const entry = state.entries[dateKey] || { title: '', content: '', mood: '', tags: [], location: '' };
        
        entryTitle.value = entry.title || '';
        entryContent.value = entry.content || '';
        moodSelect.value = entry.mood || '';
        tagsInput.value = (entry.tags || []).join(', ');
        locationInput.value = entry.location || '';
        
        currentDateDisplay.textContent = formatDateDisplay(date);
        updateWordCount();
        saveData();
    }

    // Actualizar contadores
    function updateWordCount() {
        const content = entryContent.value;
        const words = content.split(/\s+/).filter(w => w).length;
        const chars = content.length;
        const readTime = Math.ceil(words / 200);
        
        wordCount.textContent = words;
        charCount.textContent = chars;
        readingTime.textContent = readTime || 1;
    }

    // Actualizar estadísticas
    function updateStats() {
        const entries = Object.values(state.entries);
        const total = entries.length;
        const words = entries.reduce((acc, e) => acc + (e.words || 0), 0);
        const avg = total > 0 ? Math.round(words / total) : 0;
        const days = Math.floor((new Date() - new Date(state.currentDate)) / (1000 * 60 * 60 * 24)) + 1;

        totalEntries.textContent = total;
        totalWordsStat.textContent = words;
        avgWords.textContent = avg;
        bestStreak.textContent = state.bestStreak || 0;
        currentStreak.textContent = state.streak || 0;
        daysSinceStart.textContent = days > 0 ? days : 1;
        streakCount.textContent = state.streak || 0;
        totalWords.textContent = words;
    }

    // Actualizar racha
    function updateStreak() {
        const today = getToday();
        const yesterday = formatDate(new Date(Date.now() - 86400000));
        const entries = Object.keys(state.entries);
        
        if (entries.includes(today)) {
            state.streak = (state.streak || 0) + 1;
        } else if (entries.includes(yesterday)) {
            // Mantener racha
        } else {
            state.streak = 0;
        }
        
        if (state.streak > state.bestStreak) {
            state.bestStreak = state.streak;
        }
    }

    // ----- CALENDARIO -----
    function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        const monthYear = document.getElementById('monthYearDisplay');
        grid.innerHTML = '';
        
        const month = state.currentMonth;
        const year = state.currentYear;
        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const today = getToday();
        
        monthYear.textContent = new Date(year, month).toLocaleDateString('es-ES', { month: 'long', year: 'numeric' });
        
        // Días de la semana
        const weekDays = ['L', 'M', 'M', 'J', 'V', 'S', 'D'];
        weekDays.forEach(d => {
            const el = document.createElement('div');
            el.className = 'day';
            el.textContent = d;
            el.style.fontWeight = '600';
            el.style.opacity = '0.5';
            grid.appendChild(el);
        });
        
        // Días vacíos
        const startOffset = firstDay === 0 ? 6 : firstDay - 1;
        for (let i = 0; i < startOffset; i++) {
            const el = document.createElement('div');
            el.className = 'day empty';
            grid.appendChild(el);
        }
        
        // Días del mes
        for (let day = 1; day <= daysInMonth; day++) {
            const date = new Date(year, month, day);
            const dateKey = formatDate(date);
            const el = document.createElement('div');
            el.className = 'day';
            el.textContent = day;
            
            if (state.entries[dateKey]) {
                el.classList.add('has-entry');
            }
            
            if (dateKey === today) {
                el.classList.add('today');
            }
            
            el.addEventListener('click', () => {
                state.selectedDate = new Date(year, month, day);
                loadEntryForDate(state.selectedDate);
                document.getElementById('calendarContainer').style.display = 'none';
                state.calendarView = false;
            });
            
            grid.appendChild(el);
        }
    }

    // ----- INTERFAZ -----
    function updateUI() {
        // Actualizar tema
        applyTheme();
        // Actualizar lista de entradas
        updateEntryList();
    }

    function updateEntryList() {
        const container = document.getElementById('entriesList');
        container.innerHTML = '';
        const entries = Object.entries(state.entries).sort((a, b) => b[0].localeCompare(a[0]));
        
        if (entries.length === 0) {
            container.innerHTML = '<div style="padding:1rem;text-align:center;opacity:0.5;">Sin entradas aún</div>';
            return;
        }
        
        entries.forEach(([date, entry]) => {
            const div = document.createElement('div');
            div.className = 'entry-item';
            div.innerHTML = `
                <span class="entry-date">${formatDateDisplay(date)}</span>
                <span class="entry-preview">${entry.title || 'Sin título'}</span>
                <span class="entry-tags">${(entry.tags || []).slice(0, 3).join(', ')}</span>
            `;
            div.addEventListener('click', () => {
                state.selectedDate = new Date(date);
                loadEntryForDate(state.selectedDate);
                document.getElementById('entriesContainer').style.display = 'none';
                state.entriesView = false;
            });
            container.appendChild(div);
        });
    }

    // ----- TEMA -----
    function applyTheme() {
        document.body.classList.remove('dark', 'sepia');
        if (state.darkMode) document.body.classList.add('dark');
        if (state.sepiaMode) document.body.classList.add('sepia');
        
        document.getElementById('themeToggle').textContent = state.darkMode ? 'Dark Mode' : 'Light Mode';
    }

    // ----- EXPORTAR -----
    function exportTxt() {
        const dateKey = formatDate(state.selectedDate);
        const entry = state.entries[dateKey];
        if (!entry) { alert('No hay entrada para esta fecha'); return; }
        
        const content = `${entry.title}\n\n${entry.content}\n\n---\nFecha: ${formatDateDisplay(dateKey)}\nEstado: ${entry.mood || 'N/A'}\nTags: ${(entry.tags || []).join(', ')}`;
        downloadFile(content, `axiom_${dateKey}.txt`, 'text/plain');
    }

    function exportMd() {
        const dateKey = formatDate(state.selectedDate);
        const entry = state.entries[dateKey];
        if (!entry) { alert('No hay entrada para esta fecha'); return; }
        
        const content = `# ${entry.title}\n\n${entry.content}\n\n---\n*Fecha: ${formatDateDisplay(dateKey)}*\n*Estado: ${entry.mood || 'N/A'}*`;
        downloadFile(content, `axiom_${dateKey}.md`, 'text/markdown');
    }

    function exportJson() {
        const data = JSON.stringify(state.entries, null, 2);
        downloadFile(data, 'axiom_backup.json', 'application/json');
    }

    function importJson() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.json';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const data = JSON.parse(ev.target.result);
                    if (typeof data === 'object' && data !== null) {
                        state.entries = data;
                        updateStats();
                        saveData();
                        renderCalendar();
                        updateUI();
                        loadEntryForDate(state.selectedDate);
                        alert('✅ Importado correctamente');
                    }
                } catch(err) {
                    alert('❌ Error al importar');
                }
            };
            reader.readAsText(file);
        };
        input.click();
    }

    function exportAllTxt() {
        let content = '=== AXIOM DIARIO · TODAS LAS ENTRADAS ===\n\n';
        const entries = Object.entries(state.entries).sort((a, b) => a[0].localeCompare(b[0]));
        entries.forEach(([date, entry]) => {
            content += `📅 ${formatDateDisplay(date)}\n`;
            content += `📝 ${entry.title || 'Sin título'}\n`;
            content += `${entry.content || ''}\n`;
            if (entry.mood) content += `😊 ${entry.mood}\n`;
            if (entry.tags && entry.tags.length) content += `🏷️ ${entry.tags.join(', ')}\n`;
            content += '\n---\n\n';
        });
        downloadFile(content, 'axiom_todas_entradas.txt', 'text/plain');
    }

    function exportPdf() {
        const dateKey = formatDate(state.selectedDate);
        const entry = state.entries[dateKey];
        if (!entry) { alert('No hay entrada para esta fecha'); return; }
        
        const content = `
            <html>
            <head><meta charset="UTF-8"><title>AXIOM DIARIO</title>
            <style>body{font-family:Georgia,serif;max-width:700px;margin:2rem auto;padding:1rem;line-height:1.8;}
            h1{font-weight:300;border-bottom:1px solid #ccc;padding-bottom:0.5rem;}
            .meta{color:#666;font-size:0.9rem;margin:1rem 0;}
            .content{font-size:1.1rem;}
</style></head>
<body>
    <h1>${entry.title || 'Sin título'}</h1>
    <div class="meta">
        ${formatDateDisplay(dateKey)}<br>
        ${entry.mood ? 'Estado: '+entry.mood : ''}
        ${entry.tags && entry.tags.length ? ' · Tags: '+entry.tags.join(', ') : ''}
    </div>
    <div class="content">${entry.content.replace(/\n/g, '<br>')}</div>
</body></html>
`;

const win = window.open('', '_blank');
win.document.write(content);
win.document.close();
setTimeout(() => win.print(), 500);
}

function downloadFile(content, filename, type) {
const blob = new Blob([content], { type });
const url = URL.createObjectURL(blob);
const a = document.createElement('a');
a.href = url;
a.download = filename;
document.body.appendChild(a);
a.click();
document.body.removeChild(a);
URL.revokeObjectURL(url);
}

// ----- FORMATO DE TEXTO -----
function wrapText(tag) {
const content = entryContent;
const start = content.selectionStart;
const end = content.selectionEnd;
const selected = content.value.substring(start, end);
if (!selected) return;
const before = content.value.substring(0, start);
const after = content.value.substring(end);
content.value = before + tag + selected + tag + after;
content.selectionStart = start + tag.length;
content.selectionEnd = end + tag.length;
saveCurrentEntry();
}

function insertTag(tag) {
const content = entryContent;
const start = content.selectionStart;
const before = content.value.substring(0, start);
const after = content.value.substring(start);
content.value = before + tag + after;
content.selectionStart = start + tag.length;
saveCurrentEntry();
}
