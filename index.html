<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎨 PowerPoint de Dibujo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: #e8ecf1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem;
            min-height: 100vh;
        }

        .app-container {
            max-width: 1100px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
            padding: 1.5rem;
            transition: all 0.2s;
        }

        /* toolbar superior */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem 1rem;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            padding: 0.6rem 1rem;
            background: #f8fafc;
            border-radius: 60px;
            border: 1px solid #e2e8f0;
        }

        .tool-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            align-items: center;
            background: white;
            padding: 0.2rem 0.6rem;
            border-radius: 40px;
            border: 1px solid #eef2f6;
        }

        .tool-group label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #475569;
            margin-right: 0.2rem;
        }

        .btn {
            padding: 0.4rem 1rem;
            border-radius: 40px;
            border: none;
            background: #f1f4f9;
            color: #1e293b;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }
        .btn:hover {
            background: #e2e8f0;
            transform: scale(0.96);
        }
        .btn-primary {
            background: #2563eb;
            color: white;
        }
        .btn-primary:hover {
            background: #1d4ed8;
        }
        .btn-success {
            background: #16a34a;
            color: white;
        }
        .btn-success:hover {
            background: #15803d;
        }
        .btn-danger {
            background: #dc2626;
            color: white;
        }
        .btn-danger:hover {
            background: #b91c1c;
        }
        .btn-outline {
            background: transparent;
            border: 2px solid #cbd5e1;
        }
        .btn-outline:hover {
            background: #f1f5f9;
        }

        input[type="color"] {
            width: 36px;
            height: 36px;
            border: 2px solid #e2e8f0;
            border-radius: 50%;
            padding: 2px;
            cursor: pointer;
            background: white;
        }
        input[type="range"] {
            width: 80px;
            cursor: pointer;
        }
        .size-indicator {
            font-weight: 600;
            font-size: 0.8rem;
            min-width: 30px;
            text-align: center;
        }

        /* lienzo */
        .canvas-wrapper {
            position: relative;
            background: white;
            border-radius: 24px;
            border: 2px solid #e2e8f0;
            overflow: hidden;
            box-shadow: inset 0 4px 12px rgba(0,0,0,0.02);
            touch-action: none;
        }

        #canvasDibujo {
            display: block;
            width: 100%;
            height: auto;
            aspect-ratio: 16 / 9;
            background: white;
            cursor: crosshair;
            touch-action: none;
        }

        /* barra inferior */
        .status-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-top: 1rem;
            gap: 0.8rem;
        }

        .color-palette {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
        }
        .color-swatch {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: 0.1s;
        }
        .color-swatch:hover {
            transform: scale(1.15);
        }
        .color-swatch.active {
            border-color: #1e293b;
            box-shadow: 0 0 0 2px white, 0 0 0 4px #1e293b;
        }

        .action-buttons {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        /* Responsive */
        @media (max-width: 700px) {
            .app-container { padding: 1rem; }
            .toolbar { border-radius: 24px; padding: 0.8rem; }
            .tool-group { padding: 0.2rem 0.4rem; }
            .btn { font-size: 0.75rem; padding: 0.3rem 0.7rem; }
        }

        /* modo oscuro opcional (estilo PowerPoint oscuro) */
        body.dark .app-container { background: #1e293b; }
        body.dark .toolbar { background: #0f172a; border-color: #334155; }
        body.dark .tool-group { background: #1e293b; border-color: #334155; }
        body.dark .tool-group label { color: #94a3b8; }
        body.dark .btn { background: #334155; color: #e2e8f0; }
        body.dark .btn:hover { background: #475569; }
        body.dark .btn-outline { border-color: #475569; }
        body.dark .canvas-wrapper { border-color: #334155; }
        body.dark .color-swatch.active { border-color: #e2e8f0; box-shadow: 0 0 0 2px #1e293b, 0 0 0 4px #e2e8f0; }
        body.dark .status-bar { color: #cbd5e1; }
    </style>
</head>
<body>

<div class="app-container">
    <!-- Toolbar -->
    <div class="toolbar" id="toolbar">
        <div class="tool-group">
            <label>🖊️ Herramienta</label>
            <button class="btn btn-primary" id="toolPencil" title="Lápiz">✏️ Lápiz</button>
            <button class="btn btn-outline" id="toolEraser" title="Borrador">🧹 Borrar</button>
            <button class="btn btn-outline" id="toolLine" title="Línea recta">📏 Línea</button>
            <button class="btn btn-outline" id="toolRect" title="Rectángulo">▭ Rect</button>
            <button class="btn btn-outline" id="toolCircle" title="Círculo">⭕ Círculo</button>
        </div>

        <div class="tool-group">
            <label>🎨 Color</label>
            <input type="color" id="colorPicker" value="#2563eb">
        </div>

        <div class="tool-group">
            <label>📏 Tamaño</label>
            <input type="range" id="sizeSlider" min="1" max="40" value="6">
            <span class="size-indicator" id="sizeDisplay">6</span>
        </div>

        <div class="tool-group">
            <button class="btn btn-outline" id="undoBtn">↩️ Deshacer</button>
            <button class="btn btn-danger" id="clearBtn">🗑️ Limpiar</button>
        </div>
    </div>

    <!-- Lienzo -->
    <div class="canvas-wrapper">
        <canvas id="canvasDibujo" width="1600" height="900"></canvas>
    </div>

    <!-- Barra inferior -->
    <div class="status-bar">
        <div class="color-palette" id="palette">
            <!-- colores predefinidos (se generan con JS) -->
        </div>
        <div class="action-buttons">
            <button class="btn btn-outline" id="toggleThemeBtn">🌓 Modo</button>
            <button class="btn btn-success" id="downloadPngBtn">⬇️ Descargar PNG</button>
        </div>
    </div>
</div>

<script>
    (function() {
        // ------ Canvas y contexto ------
        const canvas = document.getElementById('canvasDibujo');
        const ctx = canvas.getContext('2d');
        const rect = canvas.getBoundingClientRect();

        // ------ Estado ------
        let isDrawing = false;
        let lastX = 0, lastY = 0;
        let currentTool = 'pencil'; // pencil | eraser | line | rect | circle
        let currentColor = '#2563eb';
        let currentSize = 6;
        let undoStack = [];
        const MAX_UNDO = 30;

        // Guardar estado inicial (lienzo en blanco)
        function saveState() {
            if (undoStack.length >= MAX_UNDO) undoStack.shift();
            undoStack.push(canvas.toDataURL());
        }

        function restoreState() {
            if (undoStack.length === 0) return;
            const img = new Image();
            img.onload = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0);
            };
            img.src = undoStack.pop();
        }

        // Limpiar y guardar estado
        function clearCanvas() {
            saveState();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // ------ Dibujar funciones ------
        function startDraw(e) {
            e.preventDefault();
            const pos = getMousePos(e);
            if (!pos) return;
            isDrawing = true;
            lastX = pos.x;
            lastY = pos.y;
            // Si es lápiz o borrador, comenzamos trazado
            if (currentTool === 'pencil' || currentTool === 'eraser') {
                ctx.beginPath();
                ctx.moveTo(lastX, lastY);
            }
            // Guardar estado al comenzar (para formas)
            if (['line', 'rect', 'circle'].includes(currentTool)) {
                saveState();
            }
        }

        function draw(e) {
            e.preventDefault();
            if (!isDrawing) return;
            const pos = getMousePos(e);
            if (!pos) return;

            const { x, y } = pos;

            if (currentTool === 'pencil' || currentTool === 'eraser') {
                ctx.lineWidth = currentSize;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.strokeStyle = currentTool === 'eraser' ? '#ffffff' : currentColor;
                ctx.lineTo(x, y);
                ctx.stroke();
                // actualizar para siguiente segmento
                ctx.beginPath();
                ctx.moveTo(x, y);
            } else if (currentTool === 'line') {
                // dibujar línea temporal (borrar y redibujar)
                restoreState(); // volver al estado anterior (antes de empezar la línea)
                ctx.beginPath();
                ctx.moveTo(lastX, lastY);
                ctx.lineTo(x, y);
                ctx.strokeStyle = currentColor;
                ctx.lineWidth = currentSize;
                ctx.lineCap = 'round';
                ctx.stroke();
            } else if (currentTool === 'rect') {
                restoreState();
                const w = x - lastX;
                const h = y - lastY;
                ctx.strokeStyle = currentColor;
                ctx.lineWidth = currentSize;
                ctx.strokeRect(lastX, lastY, w, h);
            } else if (currentTool === 'circle') {
                restoreState();
                const radius = Math.sqrt((x - lastX) ** 2 + (y - lastY) ** 2);
                ctx.beginPath();
                ctx.arc(lastX, lastY, radius, 0, 2 * Math.PI);
                ctx.strokeStyle = currentColor;
                ctx.lineWidth = currentSize;
                ctx.stroke();
            }
        }

        function endDraw(e) {
            if (!isDrawing) return;
            isDrawing = false;
            // Para lápiz y borrador guardamos estado al terminar
            if (currentTool === 'pencil' || currentTool === 'eraser') {
                saveState();
            } else {
                // Para formas, ya guardamos estado al empezar, pero al terminar guardamos otra vez para poder deshacer
                // pero cuidado: restoreState en draw ya guarda, mejor guardar al final
                // pero como usamos restoreState() en draw, el estado queda guardado.
                // Añadimos uno extra para poder deshacer la forma completa
                // mejor guardar al inicio y al final
                saveState();
            }
            // En caso de formas, guardamos estado final
            if (['line', 'rect', 'circle'].includes(currentTool)) {
                // ya se guardó al inicio, pero añadimos uno para poder deshacer la forma completa
                // pero para evitar duplicados, lo manejamos con cuidado
                // mejor: en startDraw guardamos, en endDraw guardamos de nuevo
                saveState();
            }
            ctx.beginPath(); // reset
        }

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
                e.preventDefault();
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            const x = (clientX - rect.left) * scaleX;
            const y = (clientY - rect.top) * scaleY;
            return { x: Math.min(Math.max(x, 0), canvas.width), y: Math.min(Math.max(y, 0), canvas.height) };
        }

        // ------ Herramientas UI ------
        function setTool(tool) {
            currentTool = tool;
            document.querySelectorAll('.tool-group .btn').forEach(b => b.classList.remove('btn-primary'));
            if (tool === 'pencil') document.getElementById('toolPencil').classList.add('btn-primary');
            else if (tool === 'eraser') document.getElementById('toolEraser').classList.add('btn-primary');
            else if (tool === 'line') document.getElementById('toolLine').classList.add('btn-primary');
            else if (tool === 'rect') document.getElementById('toolRect').classList.add('btn-primary');
            else if (tool === 'circle') document.getElementById('toolCircle').classList.add('btn-primary');
            canvas.style.cursor = tool === 'eraser' ? 'cell' : 'crosshair';
        }

        // ------ Paleta de colores ------
        const coloresPredefinidos = [
            '#2563eb', '#dc2626', '#16a34a', '#f59e0b', '#8b5cf6',
            '#ec4899', '#14b8a6', '#f97316', '#64748b', '#000000',
            '#ffffff', '#e2e8f0'
        ];

        function generarPaleta() {
            const palette = document.getElementById('palette');
            palette.innerHTML = '';
            coloresPredefinidos.forEach(color => {
                const swatch = document.createElement('div');
                swatch.className = 'color-swatch';
                swatch.style.background = color;
                if (color === '#ffffff') swatch.style.border = '1px solid #cbd5e1';
                swatch.dataset.color = color;
                swatch.addEventListener('click', () => {
                    document.getElementById('colorPicker').value = color;
                    currentColor = color;
                    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
                    swatch.classList.add('active');
                });
                palette.appendChild(swatch);
            });
            // activar el primero
            const first = palette.querySelector('.color-swatch');
            if (first) first.classList.add('active');
        }

        // ------ Descargar PNG ------
        function downloadPNG() {
            const link = document.createElement('a');
            link.download = 'dibujo_powerpoint.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        // ------ Inicializar ------
        function init() {
            // Guardar estado inicial
            saveState();

            // Eventos ratón y táctiles
            canvas.addEventListener('mousedown', startDraw);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', endDraw);
            canvas.addEventListener('mouseleave', endDraw);

            canvas.addEventListener('touchstart', startDraw, { passive: false });
            canvas.addEventListener('touchmove', draw, { passive: false });
            canvas.addEventListener('touchend', endDraw, { passive: false });

            // Herramientas
            document.getElementById('toolPencil').addEventListener('click', () => setTool('pencil'));
            document.getElementById('toolEraser').addEventListener('click', () => setTool('eraser'));
            document.getElementById('toolLine').addEventListener('click', () => setTool('line'));
            document.getElementById('toolRect').addEventListener('click', () => setTool('rect'));
            document.getElementById('toolCircle').addEventListener('click', () => setTool('circle'));
            setTool('pencil');

            // Color
            document.getElementById('colorPicker').addEventListener('input', (e) => {
                currentColor = e.target.value;
                document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
            });

            // Tamaño
            const sizeSlider = document.getElementById('sizeSlider');
            const sizeDisplay = document.getElementById('sizeDisplay');
            sizeSlider.addEventListener('input', (e) => {
                currentSize = parseInt(e.target.value);
                sizeDisplay.textContent = currentSize;
            });

            // Undo
            document.getElementById('undoBtn').addEventListener('click', () => {
                if (undoStack.length > 0) restoreState();
            });

            // Clear
            document.getElementById('clearBtn').addEventListener('click', () => {
                if (confirm('¿Borrar todo el dibujo?')) {
                    clearCanvas();
                }
            });

            // Descargar
            document.getElementById('downloadPngBtn').addEventListener('click', downloadPNG);

            // Toggle dark mode
            document.getElementById('toggleThemeBtn').addEventListener('click', () => {
                document.body.classList.toggle('dark');
            });

            // Paleta
            generarPaleta();

            // Ajustar tamaño del canvas al contenedor
            function resizeCanvas() {
                const wrapper = canvas.parentElement;
                const w = wrapper.clientWidth;
                const h = w * (9 / 16);
                canvas.style.width = w + 'px';
                canvas.style.height = h + 'px';
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();
        }

        init();
    })();
</script>
</body>
</html>
