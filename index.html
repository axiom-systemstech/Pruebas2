<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AXIOM ALARM · Recordatorios</title>
    <style>
        /* ===== RESET Y ESTILOS BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #f5f3f0;
            --text: #1a1a1a;
            --border: #e0d8d0;
            --card: #ffffff;
            --shadow: rgba(0,0,0,0.05);
            --accent: #2c3e50;
            --radius: 12px;
            --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --transition: 0.3s ease;
            --high: #e74c3c;
            --medium: #f39c12;
            --low: #2ecc71;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 1rem;
            transition: all var(--transition);
        }

        body.dark {
            --bg: #0a0a0a;
            --text: #e8e8e8;
            --border: #2a2a2a;
            --card: #141414;
            --shadow: rgba(0,0,0,0.3);
            --accent: #8a9baa;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            padding: 1.2rem 1.5rem;
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: 0 2px 12px var(--shadow);
            margin-bottom: 1.5rem;
            border: 1px solid var(--border);
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 300;
            letter-spacing: 2px;
            font-family: 'Georgia', serif;
        }

        .header h1 span {
            font-weight: 700;
            color: var(--accent);
        }

        .header-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
        }

        .btn {
            padding: 0.4rem 0.9rem;
            font-size: 0.7rem;
            font-weight: 400;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 6px;
            cursor: pointer;
            transition: all var(--transition);
            font-family: inherit;
            letter-spacing: 0.3px;
        }

        .btn:hover {
            background: var(--text);
            color: var(--bg);
            border-color: var(--text);
        }

        body.dark .btn:hover {
            background: var(--text);
            color: var(--bg);
        }

        .btn-primary {
            background: var(--text);
            color: var(--bg);
            border-color: var(--text);
        }

        .btn-primary:hover {
            opacity: 0.8;
            transform: scale(0.97);
        }

        .btn-sm {
            padding: 0.25rem 0.6rem;
            font-size: 0.65rem;
        }

        .btn-danger {
            border-color: #e74c3c;
            color: #e74c3c;
        }

        .btn-danger:hover {
            background: #e74c3c;
            color: white;
        }

        /* ===== FORMULARIO ===== */
        .form-card {
            background: var(--card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            transition: all var(--transition);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
            margin-bottom: 0.8rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .form-group label {
            font-size: 0.7rem;
            font-weight: 500;
            opacity: 0.6;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 0.5rem 0.7rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: transparent;
            color: var(--text);
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
            transition: all var(--transition);
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: var(--accent);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 60px;
        }

        .form-group input[type="color"] {
            padding: 0.2rem;
            height: 38px;
            cursor: pointer;
        }

        .form-group input[type="file"] {
            padding: 0.3rem;
            font-size: 0.7rem;
        }

        .form-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.8rem;
            flex-wrap: wrap;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        /* ===== LISTA DE RECORDATORIOS ===== */
        .reminders-list {
            background: var(--card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 1rem;
            max-height: 500px;
            overflow-y: auto;
        }

        .reminder-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 1rem;
            border-bottom: 1px solid var(--border);
            gap: 0.5rem;
            transition: all var(--transition);
            border-left: 4px solid var(--accent);
        }

        .reminder-item:last-child {
            border-bottom: none;
        }

        .reminder-item .reminder-info {
            flex: 1;
        }

        .reminder-item .reminder-title {
            font-weight: 500;
            font-size: 0.95rem;
        }

        .reminder-item .reminder-meta {
            font-size: 0.7rem;
            opacity: 0.6;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.2rem;
        }

        .reminder-item .reminder-meta span {
            background: var(--border);
            padding: 0.1rem 0.5rem;
            border-radius: 12px;
        }

        .reminder-item .reminder-actions {
            display: flex;
            gap: 0.3rem;
            flex-wrap: wrap;
        }

        .reminder-item.priority-high {
            border-left-color: var(--high);
        }

        .reminder-item.priority-medium {
            border-left-color: var(--medium);
        }

        .reminder-item.priority-low {
            border-left-color: var(--low);
        }

        .reminder-item.completed {
            opacity: 0.4;
            text-decoration: line-through;
        }

        .reminder-item .badge {
            font-size: 0.6rem;
            padding: 0.1rem 0.5rem;
            border-radius: 12px;
            background: var(--border);
            display: inline-block;
        }

        .badge-repeating {
            background: #3498db !important;
            color: white !important;
        }

        /* ===== CONTADOR ===== */
        .stats-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            padding: 0.8rem 1.2rem;
            background: var(--card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            margin-bottom: 1rem;
            justify-content: space-between;
            align-items: center;
        }

        .stats-bar .stat {
            font-size: 0.8rem;
            opacity: 0.7;
        }

        .stats-bar .stat strong {
            font-size: 1.1rem;
            opacity: 1;
        }

        /* ===== NOTIFICACIÓN DE ALARMA ===== */
        .alarm-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.5s;
        }

        .alarm-overlay.active {
            display: flex;
        }

        .alarm-box {
            background: var(--card);
            color: var(--text);
            padding: 2.5rem;
            border-radius: 20px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: bounceIn 0.5s;
        }

        .alarm-box h2 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            font-family: 'Georgia', serif;
        }

        .alarm-box .alarm-message {
            font-size: 1.1rem;
            opacity: 0.7;
            margin: 0.5rem 0 1.5rem;
        }

        .alarm-box .btn {
            font-size: 1.2rem;
            padding: 0.8rem 2rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes bounceIn {
            0% { transform: scale(0.5); opacity: 0; }
            60% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            .header { flex-direction: column; align-items: stretch; }
            .header h1 { font-size: 1.4rem; }
            .reminder-item { flex-wrap: wrap; }
            .alarm-box { padding: 1.5rem; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    </style>
</head>
<body>

<div class="container">
    <!-- HEADER -->
    <header class="header">
        <h1>AXIOM <span>ALARM</span></h1>
        <div class="header-actions">
            <button class="btn btn-sm" id="themeToggle">Light Mode</button>
            <button class="btn btn-sm" id="exportJson">⬇️ Backup</button>
            <button class="btn btn-sm" id="importJson">⬆️ Import</button>
            <button class="btn btn-sm btn-danger" id="clearAll">🗑️ Limpiar todo</button>
        </div>
    </header>

    <!-- STATS -->
    <div class="stats-bar">
        <span class="stat">⏰ Pendientes: <strong id="pendingCount">0</strong></span>
        <span class="stat">✅ Completados: <strong id="completedCount">0</strong></span>
        <span class="stat">📊 Total: <strong id="totalCount">0</strong></span>
        <span class="stat">🔔 Próximo: <strong id="nextReminder">—</strong></span>
    </div>

    <!-- FORMULARIO -->
    <div class="form-card">
        <h3 style="font-weight:300; margin-bottom:1rem; font-family:'Georgia',serif;">📝 Nuevo recordatorio</h3>
        <div class="form-row">
            <div class="form-group">
                <label>Título *</label>
                <input type="text" id="reminderTitle" placeholder="Ej: Reunión importante">
            </div>
            <div class="form-group">
                <label>Prioridad</label>
                <select id="reminderPriority">
                    <option value="low">Baja</option>
                    <option value="medium" selected>Media</option>
                    <option value="high">Alta</option>
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Fecha *</label>
                <input type="date" id="reminderDate">
            </div>
            <div class="form-group">
                <label>Hora *</label>
                <input type="time" id="reminderTime">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group full-width">
                <label>Mensaje (opcional)</label>
                <textarea id="reminderMessage" placeholder="Mensaje adicional..."></textarea>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Categoría</label>
                <input type="text" id="reminderCategory" placeholder="Trabajo, Personal, Salud...">
            </div>
            <div class="form-group">
                <label>Color</label>
                <input type="color" id="reminderColor" value="#2c3e50">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Repetir</label>
                <select id="reminderRepeat">
                    <option value="none">No repetir</option>
                    <option value="daily">Diario</option>
                    <option value="weekly">Semanal</option>
                    <option value="monthly">Mensual</option>
                    <option value="yearly">Anual</option>
                    <option value="custom">Personalizado (minutos)</option>
                </select>
            </div>
            <div class="form-group" id="customRepeatGroup" style="display:none;">
                <label>Cada X minutos</label>
                <input type="number" id="customRepeatMinutes" value="5" min="1" max="1440">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Sonido de alarma</label>
                <select id="alarmSound">
                    <option value="default">🔔 Predeterminado</option>
                    <option value="gentle">🔔 Suave</option>
                    <option value="urgent">🔔 Urgente</option>
                    <option value="custom">🎵 Personalizado</option>
                </select>
            </div>
            <div class="form-group" id="customSoundGroup" style="display:none;">
                <label>Subir audio</label>
                <input type="file" id="customSoundFile" accept="audio/*">
            </div>
        </div>
        <div class="form-actions">
            <button class="btn btn-primary" id="saveReminder">➕ Guardar recordatorio</button>
            <button class="btn" id="testAlarm">🔔 Probar alarma</button>
            <button class="btn" id="requestPermission">🔔 Activar notificaciones</button>
        </div>
    </div>

    <!-- LISTA DE RECORDATORIOS -->
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.5rem;">
        <h3 style="font-weight:300; font-family:'Georgia',serif;">📋 Recordatorios</h3>
        <div>
            <button class="btn btn-sm" id="showAll">Todos</button>
            <button class="btn btn-sm" id="showPending">Pendientes</button>
            <button class="btn btn-sm" id="showCompleted">Completados</button>
        </div>
    </div>
    <div class="reminders-list" id="remindersList"></div>
</div>

<!-- ALARMA OVERLAY -->
<div class="alarm-overlay" id="alarmOverlay">
    <div class="alarm-box">
        <h2>⏰ ¡Recordatorio!</h2>
        <div class="alarm-message" id="alarmMessage">Hora de tu recordatorio</div>
        <div style="margin:0.5rem 0; font-size:0.8rem; opacity:0.5;" id="alarmTime"></div>
        <button class="btn btn-primary" id="dismissAlarm">✅ Aceptar</button>
        <button class="btn" id="snoozeAlarm" style="margin-left:0.5rem;">⏰ Posponer 5 min</button>
    </div>
</div>

<script>
    // ============================================================
    //  AXIOM ALARM · SISTEMA DE RECORDATORIOS CON ALARMA
    //  Versión 1.0 · Todas las funciones
    // ============================================================

    // ----- ESTADO -----
    let reminders = [];
    let alarmTimeout = null;
    let alarmInterval = null;
    let alarmAudio = null;
    let alarmVibrate = null;
    let currentAlarmId = null;
    let filterMode = 'all'; // all, pending, completed
    let darkMode = false;
    let notificationPermission = false;
    let customSound = null;

    // ----- DOM ELEMENTOS -----
    const reminderTitle = document.getElementById('reminderTitle');
    const reminderDate = document.getElementById('reminderDate');
    const reminderTime = document.getElementById('reminderTime');
    const reminderPriority = document.getElementById('reminderPriority');
    const reminderMessage = document.getElementById('reminderMessage');
    const reminderCategory = document.getElementById('reminderCategory');
    const reminderColor = document.getElementById('reminderColor');
    const reminderRepeat = document.getElementById('reminderRepeat');
    const customRepeatGroup = document.getElementById('customRepeatGroup');
    const customRepeatMinutes = document.getElementById('customRepeatMinutes');
    const alarmSound = document.getElementById('alarmSound');
    const customSoundGroup = document.getElementById('customSoundGroup');
    const customSoundFile = document.getElementById('customSoundFile');
    const remindersList = document.getElementById('remindersList');
    const pendingCount = document.getElementById('pendingCount');
    const completedCount = document.getElementById('completedCount');
    const totalCount = document.getElementById('totalCount');
    const nextReminder = document.getElementById('nextReminder');
    const alarmOverlay = document.getElementById('alarmOverlay');
    const alarmMessage = document.getElementById('alarmMessage');
    const alarmTime = document.getElementById('alarmTime');

    // ----- FUNCIONES PRINCIPALES -----

    // Cargar datos
    function loadData() {
        try {
            const saved = localStorage.getItem('axiom_alarm_reminders');
            if (saved) {
                const parsed = JSON.parse(saved);
                // Convertir fechas string a Date
                reminders = parsed.map(r => ({
                    ...r,
                    date: new Date(r.date),
                    createdAt: new Date(r.createdAt)
                }));
            }
            
            const prefs = localStorage.getItem('axiom_alarm_prefs');
            if (prefs) {
                const p = JSON.parse(prefs);
                darkMode = p.darkMode || false;
                if (darkMode) document.body.classList.add('dark');
                document.getElementById('themeToggle').textContent = darkMode ? 'Dark Mode' : 'Light Mode';
            }
        } catch(e) { console.log('Error cargando', e); }
        
        renderReminders();
        updateStats();
        checkAlarms();
        setDefaultDates();
    }

    // Guardar datos
    function saveData() {
        try {
            localStorage.setItem('axiom_alarm_reminders', JSON.stringify(reminders));
            localStorage.setItem('axiom_alarm_prefs', JSON.stringify({
                darkMode: darkMode
            }));
        } catch(e) { console.log('Error guardando', e); }
    }

    // Guardar recordatorio
    function saveReminder() {
        const title = reminderTitle.value.trim();
        const date = reminderDate.value;
        const time = reminderTime.value;
        const priority = reminderPriority.value;
        const message = reminderMessage.value.trim();
        const category = reminderCategory.value.trim();
        const color = reminderColor.value;
        const repeat = reminderRepeat.value;
        const customMinutes = parseInt(customRepeatMinutes.value) || 5;

        if (!title) { alert('Por favor, escribe un título'); return; }
        if (!date || !time) { alert('Por favor, selecciona fecha y hora'); return; }

        const reminder = {
            id: Date.now().toString(36) + Math.random().toString(36).substr(2, 5),
            title: title,
            date: new Date(`${date}T${time}`),
            priority: priority,
            message: message,
            category: category,
            color: color,
            repeat: repeat,
            customMinutes: repeat === 'custom' ? customMinutes : null,
            sound: alarmSound.value,
            completed: false,
            createdAt: new Date(),
            snoozed: false
        };

        reminders.push(reminder);
        saveData();
        renderReminders();
        updateStats();
        checkAlarms();
        
        // Limpiar formulario
        reminderTitle.value = '';
        reminderMessage.value = '';
        reminderCategory.value = '';
        setDefaultDates();
        
        // Notificación de creación
        if (notificationPermission) {
            showNotification('✅ Recordatorio creado', `"${title}" para ${formatDateTime(reminder.date)}`);
        }
    }

    // Eliminar recordatorio
    function deleteReminder(id) {
        if (!confirm('¿Eliminar este recordatorio?')) return;
        reminders = reminders.filter(r => r.id !== id);
        saveData();
        renderReminders();
        updateStats();
        checkAlarms();
    }

    // Completar/descompletar
    function toggleComplete(id) {
        const reminder = reminders.find(r => r.id === id);
        if (reminder) {
            reminder.completed = !reminder.completed;
            if (reminder.completed && reminder.repeat !== 'none') {
                // Si es recurrente y se completa, programar la siguiente
                scheduleNext(reminder);
            }
            saveData();
            renderReminders();
            updateStats();
            checkAlarms();
        }
    }

    // Programar siguiente repetición
    function scheduleNext(reminder) {
        const date = new Date(reminder.date);
        switch(reminder.repeat) {
            case 'daily':
                date.setDate(date.getDate() + 1);
                break;
            case 'weekly':
                date.setDate(date.getDate() + 7);
                break;
            case 'monthly':
                date.setMonth(date.getMonth() + 1);
                break;
            case 'yearly':
                date.setFullYear(date.getFullYear() + 1);
                break;
            case 'custom':
                date.setMinutes(date.getMinutes() + (reminder.customMinutes || 5));
                break;
            default:
                return;
        }
        
        const newReminder = {
            ...reminder,
            id: Date.now().toString(36) + Math.random().toString(36).substr(2, 5),
            date: date,
            completed: false,
            snoozed: false,
            createdAt: new Date()
        };
        reminders.push(newReminder);
    }

    // Posponer (snooze)
    function snoozeReminder(id) {
        const reminder = reminders.find(r => r.id === id);
        if (reminder) {
            const newDate = new Date(reminder.date);
            newDate.setMinutes(newDate.getMinutes() + 5);
            reminder.date = newDate;
            reminder.snoozed = true;
            saveData();
            renderReminders();
            updateStats();
            checkAlarms();
            document.getElementById('dismissAlarm').click();
            showNotification('⏰ Pospuesto 5 minutos', `"${reminder.title}" se reprogramó para las ${formatTime(newDate)}`);
        }
    }

    // ----- ALARMA -----
    function checkAlarms() {
        const now = new Date();
        const pending = getPendingReminders();
        
        // Buscar el próximo recordatorio
        const next = pending.sort((a, b) => a.date - b.date)[0];
        if (next) {
            nextReminder.textContent = `${next.title} (${formatTime(next.date)})`;
        } else {
            nextReminder.textContent = '—';
        }

        // Verificar si algún recordatorio debe sonar
        pending.forEach(reminder => {
            const diff = reminder.date.getTime() - now.getTime();
            if (diff <= 3000 && diff > -10000) { // 3 segundos antes o 10 después
                triggerAlarm(reminder);
            }
        });

        // Programar siguiente verificación
        if (alarmTimeout) clearTimeout(alarmTimeout);
        alarmTimeout = setTimeout(checkAlarms, 5000);
    }

    function triggerAlarm(reminder) {
        if (currentAlarmId === reminder.id) return; // Ya está sonando
        currentAlarmId = reminder.id;
        
        // Mostrar overlay
        alarmMessage.textContent = reminder.message || `¡Hora de "${reminder.title}"!`;
        alarmTime.textContent = formatDateTime(reminder.date);
        alarmOverlay.classList.add('active');
        
        // Sonido
        playAlarmSound(reminder.sound);
        
        // Vibración
        if (navigator.vibrate) {
            navigator.vibrate([500, 200, 500, 200, 1000]);
        }
        
        // Notificación del sistema
        if (notificationPermission) {
            showNotification('⏰ ¡Recordatorio!', `${reminder.title} - ${reminder.message || 'Es hora'}`);
        }
        
        // Marcar como completado si no es recurrente
        if (reminder.repeat === 'none') {
            reminder.completed = true;
            saveData();
            renderReminders();
            updateStats();
        } else {
            // Para recurrentes, programar siguiente y marcar actual como completado
            reminder.completed = true;
            scheduleNext(reminder);
            saveData();
            renderReminders();
            updateStats();
        }
    }

    function playAlarmSound(soundType) {
        try {
            if (alarmAudio) {
                alarmAudio.pause();
                alarmAudio = null;
            }
            
            let audioUrl = null;
            
            if (soundType === 'custom' && customSound) {
                audioUrl = customSound;
            } else {
                // Generar tono según tipo
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = ctx.createOscillator();
                const gain = ctx.createGain();
                oscillator.connect(gain);
                gain.connect(ctx.destination);
                
                let frequency = 880;
                let type = 'sine';
                
                if (soundType === 'urgent') {
                    frequency = 1000;
                    type = 'square';
                } else if (soundType === 'gentle') {
                    frequency = 440;
                    type = 'sine';
                } else {
                    // default: alternar tonos
                    frequency = 880;
                    type = 'sine';
                }
                
                oscillator.frequency.value = frequency;
                oscillator.type = type;
                gain.gain.value = 0.3;
                oscillator.start();
                
                // Hacer sonar 3 veces
                let count = 0;
                const interval = setInterval(() => {
                    if (count >= 3) {
                        clearInterval(interval);
                        oscillator.stop();
                        return;
                    }
                    oscillator.frequency.value = count % 2 === 0 ? frequency : frequency * 0.8;
                    count++;
                }, 300);
                
                // Guardar referencia para detener
                alarmAudio = { stop: () => { clearInterval(interval); oscillator.stop(); } };
                return;
            }
            
            if (audioUrl) {
                alarmAudio = new Audio(audioUrl);
                alarmAudio.loop = true;
                alarmAudio.volume = 0.7;
                alarmAudio.play().catch(e => console.log('Error reproduciendo audio', e));
            }
        } catch(e) {
            console.log('Error con el sonido', e);
        }
    }

    function stopAlarm() {
        if (alarmAudio) {
            if (alarmAudio.stop) alarmAudio.stop();
            else if (alarmAudio.pause) alarmAudio.pause();
            alarmAudio = null;
        }
        alarmOverlay.classList.remove('active');
        currentAlarmId = null;
        if (navigator.vibrate) navigator.vibrate(0);
    }

    // ----- NOTIFICACIONES -----
    function requestNotificationPermission() {
        if (!('Notification' in window)) {
            alert('Este navegador no soporta notificaciones');
            return;
        }
        
        Notification.requestPermission().then(perm => {
            notificationPermission = perm === 'granted';
            if (notificationPermission) {
                alert('✅ Notificaciones activadas');
                showNotification('🔔 AXIOM ALARM', 'Las notificaciones están activas');
            } else {
                alert('❌ Permiso denegado. Actívalo desde la configuración del navegador');
            }
        });
    }

    function showNotification(title, body) {
        if (notificationPermission) {
            try {
                new Notification(title, {
                    body: body,
                    icon: '🔔'
                });
            } catch(e) {
                console.log('Error mostrando notificación', e);
            }
        }
    }

    // ----- RENDERIZADO -----
    function renderReminders() {
        remindersList.innerHTML = '';
        let filtered = reminders;
        
        if (filterMode === 'pending') {
            filtered = filtered.filter(r => !r.completed);
        } else if (filterMode === 'completed') {
            filtered = filtered.filter(r => r.completed);
        }
        
        // Ordenar por fecha
        filtered.sort((a, b) => a.date - b.date);
        
        if (filtered.length === 0) {
            remindersList.innerHTML = '<div style="padding:2rem;text-align:center;opacity:0.4;">No hay recordatorios</div>';
            return;
        }
        
        filtered.forEach(reminder => {
            const div = document.createElement('div');
            div.className = `reminder-item priority-${reminder.priority}`;
            if (reminder.completed) div.classList.add('completed');
            
            const now = new Date();
            const isPast = reminder.date < now && !reminder.completed;
            
            div.innerHTML = `
                <div class="reminder-info">
                    <div class="reminder-title" style="color:${reminder.color || '#2c3e50'}">
                        ${reminder.title}
                        ${reminder.repeat !== 'none' ? ' <span class="badge badge-repeating">🔁 ' + (reminder.repeat === 'daily' ? 'Diario' : reminder.repeat === 'weekly' ? 'Semanal' : reminder.repeat === 'monthly' ? 'Mensual' : 'Anual') + '</span>' : ''}
                        ${isPast && !reminder.completed ? ' <span class="badge" style="background:#e74c3c;color:white;">⏰ PASADO</span>' : ''}
                    </div>
                    <div class="reminder-meta">
                        <span>📅 ${formatDateTime(reminder.date)}</span>
                        ${reminder.category ? `<span>🏷️ ${reminder.category}</span>` : ''}
                        ${reminder.message ? `<span>💬 ${reminder.message}</span>` : ''}
                        <span>🔊 ${reminder.sound === 'custom' ? 'Personalizado' : reminder.sound}</span>
                    </div>
                </div>
                <div class="reminder-actions">
                    <button class="btn btn-sm ${reminder.completed ? '' : 'btn-primary'}" onclick="toggleComplete('${reminder.id}')">
                        ${reminder.completed ? '↩️ Reabrir' : '✅ Hecho'}
                    </button>
                    ${!reminder.completed ? `<button class="btn btn-sm" onclick="snoozeReminder('${reminder.id}')">⏰ +5 min</button>` : ''}
                    <button class="btn btn-sm btn-danger" onclick="deleteReminder('${reminder.id}')">🗑️</button>
                </div>
            `;
            remindersList.appendChild(div);
        });
    }

    function updateStats() {
        const total = reminders.length;
        const pending = reminders.filter(r => !r.completed).length;
        const completed = reminders.filter(r => r.completed).length;
        
        pendingCount.textContent = pending;
        completedCount.textContent = completed;
        totalCount.textContent = total;
    }

    function getPendingReminders() {
        return reminders.filter(r => !r.completed);
    }

    // ----- UTILIDADES -----
    function formatDateTime(date) {
        if (!date) return '—';
        const d = new Date(date);
        return d.toLocaleDateString('es-ES') + ' ' + d.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
    }

    function formatTime(date) {
        if (!date) return '—';
        const d = new Date(date);
        return d.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
    }

    function setDefaultDates() {
        const now = new Date();
        const date = now.toISOString().split('T')[0];
        const time = now.toTimeString().slice(0, 5);
        
        if (!reminderDate.value) reminderDate.value = date;
        if (!reminderTime.value) reminderTime.value = time;
    }

    // ----- EVENTOS -----

    document.addEventListener('DOMContentLoaded', () => {
        loadData();
        
        // Permiso de notificaciones al inicio
        if ('Notification' in window && Notification.permission === 'granted') {
            notificationPermission = true;
        }
    });

    // Guardar
    document.getElementById('saveReminder').addEventListener('click', saveReminder);
    
    // Enter para guardar
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') {
            document.getElementById('saveReminder').click();
        }
    });

    // Tema
    document.getElementById('themeToggle').addEventListener('click', () => {
        darkMode = !darkMode;
        document.body.classList.toggle('dark', darkMode);
        document.getElementById('themeToggle').textContent = darkMode ? 'Dark Mode' : 'Light Mode';
        saveData();
    });

    // Exportar
    document.getElementById('exportJson').addEventListener('click', () => {
        const data = JSON.stringify(reminders, null, 2);
        const blob = new Blob([data], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `axiom_alarm_backup_${new Date().toISOString().split('T')[0]}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    });

    // Importar
    document.getElementById('importJson').addEventListener('click', () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.json';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const data = JSON.parse(ev.target.result);
                    if (Array.isArray(data)) {
                        reminders = data.map(r => ({
                            ...r,
                            date: new Date(r.date),
                            createdAt: new Date(r.createdAt)
                        }));
                        saveData();
                        renderReminders();
                        updateStats();
                        checkAlarms();
                        alert('✅ Importado correctamente');
                    }
                } catch(err) {
                    alert('❌ Error al importar');
                }
            };
            reader.readAsText(file);
        };
        input.click();
    });

    // Limpiar todo
    document.getElementById('clearAll').addEventListener('click', () => {
        if (!confirm('¿Eliminar TODOS los recordatorios? Esta acción no se puede deshacer.')) return;
        reminders = [];
        saveData();
        renderReminders();
        updateStats();
        checkAlarms();
    });

    // Filtros
    document.getElementById('showAll').addEventListener('click', () => {
        filterMode = 'all';
        renderReminders();
    });
    
    document.getElementById('showPending').addEventListener('click', () => {
        filterMode = 'pending';
        renderReminders();
    });
    
    document.getElementById('showCompleted').addEventListener('click', () => {
        filterMode = 'completed';
        renderReminders();
    });

    // Repetición personalizada
    document.getElementById('reminderRepeat').addEventListener('change', function() {
        customRepeatGroup.style.display = this.value === 'custom' ? 'block' : 'none';
    });

    // Sonido personalizado
    document.getElementById('alarmSound').addEventListener('change', function() {
        customSoundGroup.style.display = this.value === 'custom' ? 'block' : 'none';
    });

    // Cargar sonido personalizado
    document.getElementById('customSoundFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            customSound = ev.target.result;
            alert('✅ Sonido personalizado cargado');
        };
        reader.readAsDataURL(file);
    });

    // Alarma
    document.getElementById('dismissAlarm').addEventListener('click', stopAlarm);
    
    document.getElementById('snoozeAlarm').addEventListener('click', () => {
        if (currentAlarmId) {
            snoozeReminder(currentAlarmId);
        }
        stopAlarm();
    });

    // Probar alarma
    document.getElementById('testAlarm').addEventListener('click', () => {
        const testReminder = {
            id: 'test',
            title: '🔔 Prueba de alarma',
            message: '¡Esto es una prueba!',
            date: new Date(),
            sound: alarmSound.value,
            priority: 'high'
        };
        triggerAlarm(testReminder);
        // Auto-cerrar después de 10 segundos
        setTimeout(() => {
            if (alarmOverlay.classList.contains('active')) {
                stopAlarm();
            }
        }, 10000);
    });

    // Permiso de notificaciones
    document.getElementById('requestPermission').addEventListener('click', requestNotificationPermission);

    // Actualizar cada minuto
    setInterval(() => {
        checkAlarms();
        updateStats();
    }, 60000);

    console.log('🚀 AXIOM ALARM cargado con éxito');
    console.log('⏰ ' + reminders.length + ' recordatorios activos');

    // Exponer funciones globales para onclick
    window.toggleComplete = toggleComplete;
    window.deleteReminder = deleteReminder;
    window.snoozeReminder = snoozeReminder;
</script>
</body>
