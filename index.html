<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>❤️ Para Pato</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            overflow: hidden;
            height: 100vh;
            font-family: 'Georgia', 'Segoe UI', serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #three-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .message {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
            max-width: 600px;
            animation: fadeIn 2s ease-in-out;
            pointer-events: none;
        }

        .message h1 {
            font-size: 2.8rem;
            font-weight: 300;
            color: #ffffff;
            text-shadow: 0 0 30px rgba(255, 50, 50, 0.3);
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
            font-family: 'Georgia', serif;
        }

        .message .subtitle {
            font-size: 1.2rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.8);
            text-shadow: 0 0 20px rgba(255, 50, 50, 0.2);
            letter-spacing: 4px;
            font-family: 'Georgia', serif;
        }

        .message .heart-emoji {
            font-size: 1.5rem;
            display: inline-block;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .particles-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at center, rgba(255, 50, 50, 0.03) 0%, transparent 70%);
        }

        @media (max-width: 600px) {
            .message h1 {
                font-size: 2rem;
            }
            .message .subtitle {
                font-size: 1rem;
                letter-spacing: 2px;
            }
        }
    </style>
</head>
<body>

    <!-- Contenedor Three.js -->
    <div id="three-container"></div>

    <!-- Mensaje superpuesto -->
    <div class="message">
        <h1>
            <span class="heart-emoji">❤️</span>
            Te quiero Pato
            <span class="heart-emoji">❤️</span>
        </h1>
        <div class="subtitle">Siempre a tu lado</div>
    </div>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // ============================================================
        //  CORAZÓN DINÁMICO 3D PARA PATO
        //  Hecho con amor ❤️
        // ============================================================

        // ----- CONFIGURACIÓN -----
        const container = document.getElementById('three-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);

        // ----- CÁMARA -----
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 5);
        camera.lookAt(0, 0, 0);

        // ----- RENDERER -----
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        // ----- LUCES -----
        const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
        scene.add(ambientLight);

        const light1 = new THREE.DirectionalLight(0xff3366, 1.2);
        light1.position.set(2, 3, 4);
        scene.add(light1);

        const light2 = new THREE.DirectionalLight(0xff6699, 0.8);
        light2.position.set(-3, -1, 2);
        scene.add(light2);

        const backLight = new THREE.DirectionalLight(0xcc3366, 0.5);
        backLight.position.set(0, 0, -5);
        scene.add(backLight);

        const pointLight = new THREE.PointLight(0xff0044, 0.5, 10);
        pointLight.position.set(0, 0, 2);
        scene.add(pointLight);

        // ----- CREAR CORAZÓN 3D -----
        function createHeart() {
            const group = new THREE.Group();

            const points = [];
            const segments = 60;

            for (let i = 0; i <= segments; i++) {
                const t = (i / segments) * Math.PI * 2;
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
                points.push(new THREE.Vector3(x * 0.055, y * 0.055, 0));
            }

            const shape = new THREE.Shape();
            shape.moveTo(points[0].x, points[0].y);
            for (let i = 1; i < points.length; i++) {
                shape.lineTo(points[i].x, points[i].y);
            }
            shape.lineTo(points[0].x, points[0].y);

            const extrudeSettings = {
                depth: 0.3,
                bevelEnabled: true,
                bevelSegments: 8,
                bevelSize: 0.08,
                bevelThickness: 0.1,
                steps: 1
            };

            const geometry = new THREE.ExtrudeGeometry(shape, extrudeSettings);
            
            geometry.computeBoundingBox();
            const center = geometry.boundingBox.getCenter(new THREE.Vector3());
            geometry.translate(-center.x, -center.y, -center.z);

            const material = new THREE.MeshPhysicalMaterial({
                color: 0xff2255,
                metalness: 0.3,
                roughness: 0.2,
                clearcoat: 0.4,
                clearcoatRoughness: 0.2,
                emissive: 0xaa0044,
                emissiveIntensity: 0.15,
                specularIntensity: 0.8,
                envMapIntensity: 0.6,
            });

            const heart = new THREE.Mesh(geometry, material);
            heart.castShadow = true;
            heart.receiveShadow = true;
            group.add(heart);

            const edgeGeometry = new THREE.EdgesGeometry(geometry);
            const edgeMaterial = new THREE.LineBasicMaterial({ 
                color: 0xff4477, 
                transparent: true, 
                opacity: 0.2 
            });
            const edges = new THREE.LineSegments(edgeGeometry, edgeMaterial);
            group.add(edges);

            const particleCount = 300;
            const particleGeo = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);

            for (let i = 0; i < particleCount; i++) {
                const angle = Math.random() * Math.PI * 2;
                const radius = 0.8 + Math.random() * 1.2;
                const height = (Math.random() - 0.5) * 1.5;
                
                positions[i * 3] = Math.cos(angle) * radius;
                positions[i * 3 + 1] = Math.sin(angle) * radius * 0.8 + 0.1;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 0.8;

                const color = new THREE.Color(0xff3366).lerp(new THREE.Color(0xff6699), Math.random());
                colors[i * 3] = color.r;
                colors[i * 3 + 1] = color.g;
                colors[i * 3 + 2] = color.b;
            }

            particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            particleGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const particleMat = new THREE.PointsMaterial({
                size: 0.035,
                vertexColors: true,
                transparent: true,
                opacity: 0.6,
                blending: THREE.AdditiveBlending,
            });

            const particles = new THREE.Points(particleGeo, particleMat);
            group.add(particles);

            return group;
        }

        const heartGroup = createHeart();
        heartGroup.scale.set(1.2, 1.2, 1.2);
        scene.add(heartGroup);

        // ----- ESTRELLAS DE FONDO -----
        function createStars() {
            const count = 800;
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);

            for (let i = 0; i < count; i++) {
                const radius = 10 + Math.random() * 40;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);

                positions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
                positions[i * 3 + 1] = radius * Math.cos(phi);
                positions[i * 3 + 2] = radius * Math.sin(phi) * Math.sin(theta);

                const intensity = 0.3 + Math.random() * 0.7;
                colors[i * 3] = intensity;
                colors[i * 3 + 1] = intensity * 0.8;
                colors[i * 3 + 2] = intensity;
            }

            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const mat = new THREE.PointsMaterial({
                size: 0.08,
                vertexColors: true,
                transparent: true,
                opacity: 0.6,
                blending: THREE.AdditiveBlending,
            });

            return new THREE.Points(geo, mat);
        }

        const stars = createStars();
        scene.add(stars);

        // ----- ANIMACIÓN -----
        let time = 0;

        function animate() {
            requestAnimationFrame(animate);
            time += 0.008;

            heartGroup.rotation.x = Math.sin(time * 0.3) * 0.08;
            heartGroup.rotation.y = time * 0.5;
            heartGroup.rotation.z = Math.sin(time * 0.2) * 0.05;

            const beat = Math.sin(time * 4) * 0.03 + 1;
            const beat2 = Math.sin(time * 4 + 0.5) * 0.015 + 1;
            heartGroup.scale.x = 1.2 * beat * beat2;
            heartGroup.scale.y = 1.2 * beat * beat2;
            heartGroup.scale.z = 1.2 * beat * beat2;

            stars.rotation.x += 0.0001;
            stars.rotation.y += 0.0002;

            pointLight.intensity = 0.4 + Math.sin(time * 3) * 0.2;

            renderer.render(scene, camera);
        }

        animate();

        // ----- RESPONSIVE -----
        function onResize() {
            const width = window.innerWidth;
            const height = window.innerHeight;
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
        }

        window.addEventListener('resize', onResize);

        console.log('❤️ Para Pato - Te quiero hermano');
        console.log('❤️ Siempre a tu lado');
    </script>
</body>
</html>
